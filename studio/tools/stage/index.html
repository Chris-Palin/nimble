<script>
/* ================================================================== */
/* PART E — layout presets, thumbnail rail, canvas interactions        */
/* ================================================================== */
const LAYOUTS = [
  { id:'centered', name:'Centred', solve(f){ return [{scale:86, x:0, y:0}]; } },
  { id:'hero', name:'Hero', solve(f){ return [{scale:112, x:0, y:0.045}]; } },
  { id:'bleed-bottom', name:'Bleed bottom', solve(f){
      const tall = f.height >= f.width;
      return [{scale: tall?150:135, x:0, y: tall?0.34:0.38, rotate:0, shadow:'dramatic'}];
  }},
  { id:'bleed-right', name:'Bleed right', solve(f){ return [{scale:130, x:0.33, y:0.04, rotate:-4, shadow:'soft'}]; } },
  { id:'bleed-left', name:'Bleed left', solve(f){ return [{scale:130, x:-0.33, y:0.04, rotate:4, shadow:'soft'}]; } },
  { id:'tilted', name:'Tilted', solve(f){ return [{scale:88, x:0, y:-0.015, rotateX:10, rotateY:-16, perspective:1400, shadow:'long'}]; } },
  { id:'float', name:'Perspective float', solve(f){ return [{scale:90, x:-0.03, y:-0.03, rotateY:24, rotateX:4, perspective:1100, shadow:'floating'}]; } },
  { id:'diagonal', name:'Diagonal', solve(f){ return [{scale:98, x:-0.05, y:-0.05, rotate:-8, shadow:'soft'}]; } },
  { id:'corner', name:'Corner peek', solve(f){ return [{scale:56, x:0.26, y:0.29, rotate:-3, shadow:'dramatic'}]; } },
  { id:'duo-stack', name:'Duo stack', solve(f){ return [
      {scale:92, x:-0.05, y:-0.06, rotate:0, shadow:'soft', deviceHint:'back'},
      {scale:46, x:0.24, y:0.2, rotate:0, shadow:'dramatic', deviceHint:'front'},
  ]; } },
  { id:'duo-split', name:'Duo split', solve(f){ return [
      {scale:64, x:-0.2, y:0.01, rotateY:16, perspective:1400, shadow:'soft'},
      {scale:64, x:0.2, y:0.01, rotateY:-16, perspective:1400, shadow:'soft'},
  ]; } },
  { id:'trio', name:'Trio cascade', solve(f){ return [
      {scale:74, x:0.24, y:0.06, rotateY:-20, perspective:1500, shadow:'soft'},
      {scale:80, x:0.02, y:0.02, rotateY:-20, perspective:1500, shadow:'soft'},
      {scale:86, x:-0.22, y:-0.02, rotateY:-20, perspective:1500, shadow:'dramatic'},
  ]; } },
  { id:'grid4', name:'Grid', solve(f){ return [
      {scale:42, x:-0.2, y:-0.21, rotate:0, shadow:'soft'},
      {scale:42, x:0.22, y:-0.17, rotate:0, shadow:'soft'},
      {scale:42, x:-0.22, y:0.19, rotate:0, shadow:'soft'},
      {scale:42, x:0.2, y:0.23, rotate:0, shadow:'soft'},
  ]; } },
];
const LAYOUT_BY_ID = Object.fromEntries(LAYOUTS.map(l=>[l.id,l]));

function solvedFor(id, f){ return LAYOUT_BY_ID[id].solve(f); }

function layoutOverride(compRef, idx){
  if (!ui.previewLayout) return null;
  const solved = solvedFor(ui.previewLayout, compRef.frame);
  const t = solved[Math.min(idx, solved.length-1)];
  return { scale:t.scale, x:t.x, y:t.y, rotate:t.rotate||0, rotateX:t.rotateX||0,
           rotateY:t.rotateY||0, perspective:t.perspective||1200, shadow:t.shadow };
}

function applyLayout(id, animate = true){
  const solved = solvedFor(id, comp.frame);
  ui.previewLayout = null;
  ui.travel = animate;
  mutate(c=>{
    while (c.mockups.length < solved.length){
      const cloneM = JSON.parse(JSON.stringify(c.mockups[0]));
      cloneM.id = uid();
      c.mockups.push(cloneM);
    }
    c.mockups.length = solved.length;
    // duo stack pairs a big device with a phone in front
    if (solved.some(t=>t.deviceHint)){
      const cat = c.mockups[0].device.category;
      solved.forEach((t,i)=>{
        const mk = c.mockups[i];
        if (t.deviceHint === 'back' && (cat === 'phone' || cat === 'bare')){
          mk.device = {...mk.device, category:'laptop', modelId:'macbook-pro-14', variant:'space'};
        }
        if (t.deviceHint === 'front' && cat !== 'phone'){
          mk.device = {...mk.device, category:'phone', modelId:'iphone-17', variant:'space'};
        }
      });
    }
    solved.forEach((t,i)=>{
      const mk = c.mockups[i];
      Object.assign(mk.transform, {
        scale:t.scale, x:t.x, y:t.y, rotate:t.rotate||0,
        rotateX:t.rotateX||0, rotateY:t.rotateY||0, perspective:t.perspective||1200,
      });
      if (t.shadow) mk.shadow = { presetId:t.shadow, ...SHADOW_PRESETS[t.shadow], color:mk.shadow.color };
    });
    c.layoutPresetId = id;
  }, {rebuildPanels:true});
  buildRail();
}
function reSolveLayout(){
  if (comp.layoutPresetId) applyLayout(comp.layoutPresetId, false);
}

/* ---- thumbnail rail: live miniatures of the real composition ---- */
function buildRail(){
  const rail = $('presetRail');
  rail.textContent = '';
  LAYOUTS.forEach((L, i)=>{
    const b = el('button','lp'+(comp.layoutPresetId===L.id?' on':''));
    b.title = `${L.name} (${i+1<=9?i+1:''})`;
    const th = el('div','lp-thumb');
    const nm = el('div','lp-name'); nm.textContent = L.name;
    b.append(th, nm);
    b.addEventListener('click', ()=>applyLayout(L.id, true));
    let hoverT = null;
    b.addEventListener('mouseenter', ()=>{
      hoverT = setTimeout(()=>{ ui.previewLayout = L.id; renderMain(); }, 150);
    });
    b.addEventListener('mouseleave', ()=>{
      clearTimeout(hoverT);
      if (ui.previewLayout === L.id){ ui.previewLayout = null; renderMain(); }
    });
    rail.appendChild(b);
  });
  renderThumbs();
}
function renderThumbs(){
  const rail = $('presetRail');
  const thumbs = rail.querySelectorAll('.lp .lp-thumb');
  const f = comp.frame;
  const tw = rail.clientWidth ? rail.clientWidth - 28 : 152;
  const k = tw / f.width;
  const thH = Math.min(Math.round(f.height*k), 280);
  thumbs.forEach((th, i)=>{
    const L = LAYOUTS[i];
    const mini = JSON.parse(JSON.stringify(comp));
    const solved = L.solve(mini.frame);
    while (mini.mockups.length < solved.length){
      const cm = JSON.parse(JSON.stringify(mini.mockups[0])); cm.id = uid(); mini.mockups.push(cm);
    }
    mini.mockups.length = solved.length;
    if (solved.some(t=>t.deviceHint)){
      const cat = mini.mockups[0].device.category;
      solved.forEach((t,j)=>{
        const mk = mini.mockups[j];
        if (t.deviceHint === 'back' && (cat === 'phone' || cat === 'bare'))
          mk.device = {...mk.device, category:'laptop', modelId:'macbook-pro-14', variant:'space'};
        if (t.deviceHint === 'front' && cat !== 'phone')
          mk.device = {...mk.device, category:'phone', modelId:'iphone-17', variant:'space'};
      });
    }
    solved.forEach((t,j)=>{
      Object.assign(mini.mockups[j].transform, {
        scale:t.scale, x:t.x, y:t.y, rotate:t.rotate||0,
        rotateX:t.rotateX||0, rotateY:t.rotateY||0, perspective:t.perspective||1200,
      });
      if (t.shadow) mini.mockups[j].shadow = { presetId:t.shadow, ...SHADOW_PRESETS[t.shadow], color:mini.mockups[j].shadow.color };
    });
    th.style.height = thH+'px';
    th.textContent = '';
    const holder = el('div', null, {
      width:f.width+'px', height:f.height+'px', transform:`scale(${k})`, transformOrigin:'0 0',
      flex:'none', pointerEvents:'none',
    });
    const wasPreview = ui.previewLayout; ui.previewLayout = null;
    holder.appendChild(buildComposition(mini, {interactive:false, atmoScale: Math.min(0.3, tw/f.width*2), atmoTime: performance.now()/1000}));
    ui.previewLayout = wasPreview;
    const clip = el('div', null, {width:tw+'px', height:thH+'px', overflow:'hidden', position:'relative'});
    clip.appendChild(holder);
    th.appendChild(clip);
  });
  [...rail.querySelectorAll('.lp')].forEach((b,i)=>b.classList.toggle('on', comp.layoutPresetId === LAYOUTS[i].id));
}

/* ---- background handles (mesh points / spotlight / radial centre) ---- */
function renderBgHandles(scaler, k){
  scaler.querySelectorAll('.bghandle').forEach(h=>h.remove());
  if (ui.activeAcc !== 'frame') return;
  const f = comp.frame, bg = f.background;
  const addHandle = (fx, fy, color, onMove, onDone)=>{
    const h = el('div','bghandle');
    h.style.left = (fx*f.width*k)+'px';
    h.style.top = (fy*f.height*k)+'px';
    h.style.background = color;
    h.addEventListener('pointerdown', ev=>{
      ev.preventDefault(); ev.stopPropagation();
      const rect = scaler.getBoundingClientRect();
      const move = e=>{
        const nx = clamp((e.clientX-rect.left)/rect.width, 0, 1);
        const ny = clamp((e.clientY-rect.top)/rect.height, 0, 1);
        h.style.left = (nx*100)+'%'; h.style.top = (ny*100)+'%';
        onMove(nx, ny);
        renderMainLight();
      };
      const up = ()=>{ removeEventListener('pointermove',move); removeEventListener('pointerup',up); (onDone||afterChange)(); };
      addEventListener('pointermove',move); addEventListener('pointerup',up);
    });
    scaler.appendChild(h);
  };
  if (bg.type === 'gradient' && bg.mode === 'mesh'){
    bg.meshPoints.forEach((p,i)=>{
      addHandle(p.x, p.y, p.color,
        (nx,ny)=>{ p.x = nx; p.y = ny; },
        ()=>{ ui.selMesh = i; afterChange({rebuildPanels:true}); });
    });
  }
  else if (bg.type === 'gradient' && (bg.mode === 'radial' || bg.mode === 'conic')){
    addHandle((bg.x??50)/100, (bg.y??50)/100, '#ffffff',
      (nx,ny)=>{ bg.x = Math.round(nx*100); bg.y = Math.round(ny*100); },
      ()=>afterChange({rebuildPanels:true}));
  }
  else if (bg.type === 'atmosphere' && f.atmo.effect === 'spotlight'){
    addHandle(f.atmo.params.x ?? 0.5, f.atmo.params.y ?? 0.3, '#FCCA46',
      (nx,ny)=>{ f.atmo.params.x = nx; f.atmo.params.y = ny; },
      ()=>afterChange());
  }
}
/* light re-render used mid-drag: comp only, no handles/panel rebuild */
function renderMainLight(){
  const host = $('compHost');
  liveAtmo = [];
  host.textContent = '';
  host.appendChild(buildComposition(comp, {
    interactive:true, atmoTime: performance.now()/1000,
    registerAtmo:(canvas,scale)=>liveAtmo.push({canvas,scale}),
  }));
  attachCanvasInteractions(host);
}

/* ---- mockup dragging with snap guides + screen panning ---- */
function attachCanvasInteractions(host){
  host.querySelectorAll('.screen-empty').forEach(s=>{
    s.addEventListener('pointerdown', ev=>ev.stopPropagation());
    s.addEventListener('click', ev=>{ ev.stopPropagation(); $('filePick').click(); });
  });
  host.querySelectorAll('.mockup-hit').forEach(hit=>{
    hit.addEventListener('pointerdown', ev=>{
      if (ev.button !== 0 || ui.spacePan) return;
      ev.preventDefault();
      const idx = +hit.dataset.mockupIdx;
      const m = comp.mockups[idx];
      const k = viewScale();
      const f = comp.frame;

      if (ev.shiftKey && m.screenshot){
        // shift-drag pans the screenshot inside the screen
        const box = hit.querySelector('.screen-box');
        const rect = box ? box.getBoundingClientRect() : hit.getBoundingClientRect();
        const sx = ev.clientX, sy = ev.clientY;
        const ox = m.screenshot.x, oy = m.screenshot.y;
        const move = e=>{
          m.screenshot.x = clamp(Math.round(ox + (e.clientX-sx)/rect.width*100), -80, 80);
          m.screenshot.y = clamp(Math.round(oy + (e.clientY-sy)/rect.height*100), -80, 80);
          renderMainLight();
        };
        const up = ()=>{ removeEventListener('pointermove',move); removeEventListener('pointerup',up); afterChange({rebuildPanels:true}); };
        addEventListener('pointermove',move); addEventListener('pointerup',up);
        return;
      }

      const sx = ev.clientX, sy = ev.clientY;
      const ox = m.transform.x, oy = m.transform.y;
      const scaler = $('compScaler');
      const SNAPS = [0, -1/6, 1/6];        // centre + thirds (offsets from centre)
      let guides = [];
      const clearGuides = ()=>{ guides.forEach(g=>g.remove()); guides = []; };
      const move = e=>{
        let nx = ox + (e.clientX-sx)/k/f.width;
        let ny = oy + (e.clientY-sy)/k/f.height;
        clearGuides();
        const tol = 7/k;
        SNAPS.forEach(sv=>{
          if (Math.abs(nx - sv)*f.width < tol){
            nx = sv;
            const g = el('div','guide v'); g.style.left = ((0.5+sv)*f.width*k)+'px';
            scaler.appendChild(g); guides.push(g);
          }
          if (Math.abs(ny - sv)*f.height < tol){
            ny = sv;
            const g = el('div','guide h'); g.style.top = ((0.5+sv)*f.height*k)+'px';
            scaler.appendChild(g); guides.push(g);
          }
        });
        // edge guides: frame edges when the offset crosses ±0.5
        [-0.5, 0.5].forEach(edge=>{
          if (Math.abs(nx - edge)*f.width < tol){ nx = edge;
            const g = el('div','guide v'); g.style.left = ((0.5+edge)*f.width*k)+'px'; scaler.appendChild(g); guides.push(g); }
          if (Math.abs(ny - edge)*f.height < tol){ ny = edge;
            const g = el('div','guide h'); g.style.top = ((0.5+edge)*f.height*k)+'px'; scaler.appendChild(g); guides.push(g); }
        });
        m.transform.x = clamp(nx, -0.75, 0.75);
        m.transform.y = clamp(ny, -0.75, 0.75);
        comp.layoutPresetId = null;
        renderMainLight();
      };
      const up = ()=>{
        removeEventListener('pointermove',move); removeEventListener('pointerup',up);
        clearGuides();
        afterChange({rebuildPanels:true});
        buildRail();
      };
      addEventListener('pointermove',move); addEventListener('pointerup',up);
    });
  });
}

/* ---- zoom & pan ---- */
$('btnZoomFit').addEventListener('click', ()=>{ ui.zoom = 'fit'; ui.panX = ui.panY = 0; renderMain(); });
$('btnZoom100').addEventListener('click', ()=>{ ui.zoom = 1; renderMain(); });
(()=>{
  const wrap = $('canvasWrap');
  addEventListener('keydown', e=>{
    if (e.code === 'Space' && !/^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName)){
      ui.spacePan = true; wrap.classList.add('panning'); e.preventDefault();
    }
  });
  addEventListener('keyup', e=>{ if (e.code === 'Space'){ ui.spacePan = false; wrap.classList.remove('panning'); } });
  wrap.addEventListener('pointerdown', e=>{
    if (!ui.spacePan) return;
    e.preventDefault();
    const sx = e.clientX - ui.panX, sy = e.clientY - ui.panY;
    const move = ev=>{
      ui.panX = ev.clientX - sx; ui.panY = ev.clientY - sy;
      $('compScaler').style.transform = `translate(${ui.panX}px, ${ui.panY}px)`;
    };
    const up = ()=>{ removeEventListener('pointermove',move); removeEventListener('pointerup',up); };
    addEventListener('pointermove',move); addEventListener('pointerup',up);
  });
})();

/* ---- screenshot intake: paste, drop, pick ---- */
function loadImageBlob(blob, cb){
  const rd = new FileReader();
  rd.onload = ()=>{
    const img = new Image();
    img.onload = ()=>cb({src:rd.result, w:img.naturalWidth, h:img.naturalHeight});
    img.src = rd.result;
  };
  rd.readAsDataURL(blob);
}
function setScreenshot(blob){
  loadImageBlob(blob, info=>{
    const id = 'img_'+uid();
    IMAGES[id] = info;
    mutate(c=>{
      c.mockups.forEach(mk=>{ mk.screenshot = { src:id, fit:'cover', scale:100, x:0, y:0 }; });
    }, {rebuildPanels:true});
    buildRail();
    // paste confirmation: quick scale-in on the mockup
    if (!REDUCED){
      $('compHost').querySelectorAll('.mockup-hit').forEach(h=>{
        h.animate([{opacity:.4, transform:h.style.transform+' scale(.94)'},{opacity:1, transform:h.style.transform}],
          {duration:340, easing:'cubic-bezier(.3,1.4,.5,1)'});
      });
    }
    maybeSuggestDevice(info);
  });
}
function setBgImage(blob){
  loadImageBlob(blob, info=>{
    const id = 'img_'+uid();
    IMAGES[id] = info;
    mutate(c=>{ c.frame.background.type = 'image'; c.frame.image.src = id; c.frame.transparent = false; }, {rebuildPanels:true});
  });
}
document.addEventListener('paste', e=>{
  const item = [...(e.clipboardData?.items || [])].find(i=>i.type.startsWith('image/'));
  if (!item) return;
  if (/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
  e.preventDefault();
  setScreenshot(item.getAsFile());
  toast('Screenshot placed');
});
$('filePick').addEventListener('change', e=>{
  const fl = e.target.files[0];
  if (fl) setScreenshot(fl);
  e.target.value = '';
});
$('bgFilePick').addEventListener('change', e=>{
  const fl = e.target.files[0];
  if (fl) setBgImage(fl);
  e.target.value = '';
});
(()=>{
  let dragDepth = 0;
  addEventListener('dragenter', e=>{
    if (![...e.dataTransfer?.types || []].includes('Files')) return;
    dragDepth++;
    $('dropOverlay').classList.add('show');
  });
  addEventListener('dragleave', ()=>{
    dragDepth = Math.max(0, dragDepth-1);
    if (!dragDepth) $('dropOverlay').classList.remove('show');
  });
  addEventListener('dragover', e=>e.preventDefault());
  addEventListener('drop', e=>{
    e.preventDefault();
    dragDepth = 0;
    $('dropOverlay').classList.remove('show');
    const fl = [...e.dataTransfer.files].find(f=>f.type.startsWith('image/'));
    if (fl) setScreenshot(fl);
  });
})();

/* ---- device suggestion (never automatic) ---- */
let suggestTimer = null;
function showSuggestion(text, actionLabel, fn){
  const chip = $('suggestChip');
  chip.textContent = '';
  const t = el('span'); t.textContent = text;
  const act = el('button','primary'); act.textContent = actionLabel;
  act.addEventListener('click', ()=>{ fn(); hideSuggestion(); });
  const x = el('button','x'); x.textContent = '✕'; x.title = 'Dismiss';
  x.addEventListener('click', hideSuggestion);
  chip.append(t, act, x);
  chip.classList.add('show');
  clearTimeout(suggestTimer);
  suggestTimer = setTimeout(hideSuggestion, 12000);
}
function hideSuggestion(){ $('suggestChip').classList.remove('show'); }
function maybeSuggestDevice(info){
  const aspect = info.w/info.h;
  const cat = comp.mockups[0].device.category;
  if (aspect < 0.68 && cat !== 'phone'){
    showSuggestion('This looks like a phone screenshot.', 'Switch to iPhone 17', ()=>{
      mutate(c=>c.mockups.forEach(mk=>{ mk.device.category='phone'; mk.device.modelId='iphone-17'; mk.device.variant='space'; }), {rebuildPanels:true});
      buildRail();
    });
  } else if (aspect > 1.25 && cat === 'phone'){
    showSuggestion('This looks like a desktop screenshot.', 'Switch to Safari frame', ()=>{
      mutate(c=>c.mockups.forEach(mk=>{ mk.device.category='browser'; mk.device.modelId='browser-safari'; }), {rebuildPanels:true});
      buildRail();
    });
  }
}
</script>

<script>
/* ================================================================== */
/* PART F — export, history, shortcuts, persistence, boot              */
/* ================================================================== */

/* ---- html-to-image, loaded on first export ---- */
let h2iPromise = null;
function loadH2I(){
  if (window.htmlToImage) return Promise.resolve();
  if (!h2iPromise) h2iPromise = new Promise((res, rej)=>{
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js';
    s.onload = res;
    s.onerror = ()=>{ h2iPromise = null; rej(new Error('Could not load the export library — check your connection.')); };
    document.head.appendChild(s);
  });
  return h2iPromise;
}

const exportSettings = { format:'png', quality:0.92, scale:1 };

async function renderCompToBlob(compRef, scale, format, quality){
  await loadH2I();
  ui.exporting = true;
  const frozenT = performance.now()/1000;
  const stage = el('div', null, {
    position:'fixed', left:'-100000px', top:'0', zIndex:'-1',
    width:compRef.frame.width+'px', height:compRef.frame.height+'px',
  });
  const wasPreview = ui.previewLayout; ui.previewLayout = null;
  stage.appendChild(buildComposition(compRef, {
    interactive:false, atmoTime:frozenT, atmoScale:scale,   // atmosphere rendered at export resolution
  }));
  ui.previewLayout = wasPreview;
  document.body.appendChild(stage);
  try{
    await document.fonts.ready;
    await Promise.all([...stage.querySelectorAll('img')].map(i=>i.decode().catch(()=>{})));
    const node = stage.firstChild;
    const opts = {
      width: compRef.frame.width, height: compRef.frame.height,
      pixelRatio: scale, cacheBust: false,
      backgroundColor: compRef.frame.transparent ? null : undefined,
    };
    let blob;
    if (format === 'jpg')       blob = await dataURLtoBlob(await htmlToImage.toJpeg(node, {...opts, quality, backgroundColor:'#000000'}));
    else if (format === 'webp'){
      const canvas = await htmlToImage.toCanvas(node, opts);
      blob = await new Promise(r=>canvas.toBlob(r, 'image/webp', quality));
    }
    else blob = await dataURLtoBlob(await htmlToImage.toPng(node, opts));
    return blob;
  } finally {
    stage.remove();
    ui.exporting = false;
  }
}
async function dataURLtoBlob(url){ return (await fetch(url)).blob(); }

function exportFilename(compRef, ext){
  const d = new Date();
  const pad = n=>String(n).padStart(2,'0');
  const ts = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
  const preset = compRef.layoutPresetId || 'custom';
  return `nimble-stage_${preset}_${compRef.frame.width}x${compRef.frame.height}_${ts}.${ext}`;
}
function downloadBlob(blob, name){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 8000);
}

async function doExport(){
  const { format, quality, scale } = exportSettings;
  const f = comp.frame;
  toast(`Rendering ${f.width*scale}×${f.height*scale}…`);
  try{
    const blob = await renderCompToBlob(comp, scale, format, quality);
    downloadBlob(blob, exportFilename(comp, format === 'jpg' ? 'jpg' : format));
    toast(`Exported ${f.width*scale}×${f.height*scale} ${format.toUpperCase()} (${(blob.size/1048576).toFixed(1)} MB)`);
  }catch(err){ toast(err.message || 'Export failed'); }
}
async function doCopy(){
  toast('Rendering…');
  try{
    const blob = await renderCompToBlob(comp, exportSettings.scale, 'png', 1);
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    toast('Copied to clipboard');
  }catch(err){ toast('Clipboard blocked — use Export instead'); }
}

const BATCH_TARGETS = ['ig-square','ig-portrait','ig-story','x-post','og','yt-thumb','li-post'];
async function doBatch(selected){
  if (!selected.length) return toast('Pick at least one size');
  const { format, quality, scale } = exportSettings;
  toast(`Batch: rendering ${selected.length} sizes…`);
  for (const id of selected){
    const [,,w,h] = DIM_BY_ID[id];
    const c2 = JSON.parse(JSON.stringify(comp));
    c2.frame.width = w; c2.frame.height = h; c2.frame.presetId = id;
    // layout re-solves for each ratio rather than naively cropping
    const lid = c2.layoutPresetId || 'centered';
    const solved = solvedFor(lid, c2.frame);
    while (c2.mockups.length < solved.length){
      const cm = JSON.parse(JSON.stringify(c2.mockups[0])); cm.id = uid(); c2.mockups.push(cm);
    }
    c2.mockups.length = solved.length;
    solved.forEach((t,i)=>Object.assign(c2.mockups[i].transform, {
      scale:t.scale, x:t.x, y:t.y, rotate:t.rotate||0,
      rotateX:t.rotateX||0, rotateY:t.rotateY||0, perspective:t.perspective||1200,
    }));
    c2.layoutPresetId = lid;
    try{
      const blob = await renderCompToBlob(c2, scale, format, quality);
      downloadBlob(blob, exportFilename(c2, format === 'jpg' ? 'jpg' : format));
      await new Promise(r=>setTimeout(r, 450));
    }catch(err){ toast(`Failed at ${w}×${h}: ${err.message}`); return; }
  }
  toast(`Batch done — ${selected.length} files`);
}

/* ---- export popover ---- */
function buildExportPop(){
  const pop = $('exportPop');
  pop.textContent = '';
  const h1 = el('h3'); h1.textContent = 'Format'; pop.appendChild(h1);
  segRow(pop, [['png','PNG'],['jpg','JPG'],['webp','WebP']],
    ()=>exportSettings.format, v=>{ exportSettings.format = v; buildExportPop(); }, true);
  if (exportSettings.format !== 'png'){
    sliderRow(pop, 'Quality', 50, 100, 1, ()=>Math.round(exportSettings.quality*100),
      v=>exportSettings.quality = v/100, {def:92});
  }
  const h2 = el('h3'); h2.textContent = 'Scale'; pop.appendChild(h2);
  segRow(pop, [[1,'1×'],[2,'2×'],[3,'3×']],
    ()=>exportSettings.scale, v=>{ exportSettings.scale = +v; buildExportPop(); }, true);
  const dims = el('div','note');
  dims.textContent = `Output: ${comp.frame.width*exportSettings.scale} × ${comp.frame.height*exportSettings.scale}px`;
  pop.appendChild(dims);
  const main = el('div','btnrow', {marginTop:'12px'});
  const go = el('button','primary'); go.textContent = 'Export';
  go.addEventListener('click', ()=>{ closeExportPop(); doExport(); });
  const cp = el('button'); cp.textContent = 'Copy';
  cp.addEventListener('click', ()=>{ closeExportPop(); doCopy(); });
  main.append(go, cp);
  pop.appendChild(main);

  const h3 = el('h3'); h3.textContent = 'Batch export'; pop.appendChild(h3);
  const list = el('div'); list.id = 'batchList';
  BATCH_TARGETS.forEach(id=>{
    const [, name, w, h] = DIM_BY_ID[id];
    const lab = el('label');
    const cb = el('input'); cb.type = 'checkbox'; cb.value = id;
    cb.checked = ['ig-square','ig-story','x-post','og'].includes(id);
    const t = el('span'); t.textContent = name;
    t.title = `${w}×${h}`;
    lab.append(cb, t);
    list.appendChild(lab);
  });
  pop.appendChild(list);
  const bb = el('button', null, {width:'100%'});
  bb.textContent = 'Export batch';
  bb.addEventListener('click', ()=>{
    const sel = [...list.querySelectorAll('input:checked')].map(c=>c.value);
    closeExportPop(); doBatch(sel);
  });
  pop.appendChild(bb);

  const h4 = el('h3'); h4.textContent = 'Share'; pop.appendChild(h4);
  const sb = el('button', null, {width:'100%'});
  sb.textContent = 'Copy link to this composition';
  sb.title = 'Everything except your images, encoded in the URL';
  sb.addEventListener('click', async ()=>{
    try{
      await navigator.clipboard.writeText(shareURL());
      toast('Link copied — images are not included');
    }catch(e){ toast('Clipboard blocked'); }
    closeExportPop();
  });
  pop.appendChild(sb);
}
function closeExportPop(){ $('exportPop').classList.remove('show'); }
$('btnExportOpen').addEventListener('click', e=>{
  e.stopPropagation();
  const pop = $('exportPop');
  if (pop.classList.contains('show')) return closeExportPop();
  buildExportPop();
  pop.classList.add('show');
});
document.addEventListener('click', e=>{
  const pop = $('exportPop');
  if (pop.classList.contains('show') && !pop.contains(e.target)) closeExportPop();
});
$('btnCopy').addEventListener('click', doCopy);

/* ---- share URL (composition minus image data) ---- */
function compForShare(){
  const c2 = JSON.parse(JSON.stringify(comp));
  c2.mockups.forEach(mk=>mk.screenshot = null);
  c2.frame.image.src = null;
  return c2;
}
function shareURL(){
  const json = JSON.stringify(compForShare());
  const enc = btoa(unescape(encodeURIComponent(json)));
  return location.origin + location.pathname + '#s=' + enc;
}
function tryLoadHash(){
  if (!location.hash.startsWith('#s=')) return false;
  try{
    const json = decodeURIComponent(escape(atob(location.hash.slice(3))));
    const c2 = JSON.parse(json);
    if (c2 && c2.version === 1 && c2.frame && c2.mockups){
      comp = c2;
      history.replaceState(null, '', location.pathname);
      return true;
    }
  }catch(e){}
  return false;
}

/* ---- undo / redo ---- */
let histStack = [], histIdx = -1, commitTimer = null;
function commitNow(){
  clearTimeout(commitTimer);
  const s = JSON.stringify(comp);
  if (histStack[histIdx] === s) return;
  histStack = histStack.slice(0, histIdx+1);
  histStack.push(s);
  if (histStack.length > 80) histStack.shift();
  histIdx = histStack.length-1;
}
function scheduleCommit(){ clearTimeout(commitTimer); commitTimer = setTimeout(commitNow, 380); }
function restoreFrom(json){
  comp = JSON.parse(json);
  buildPanels(); renderMain(); buildRail(); syncMeta(); scheduleSave();
}
function undo(){
  commitNow();
  if (histIdx <= 0) return toast('Nothing to undo');
  histIdx--;
  restoreFrom(histStack[histIdx]);
}
function redo(){
  if (histIdx >= histStack.length-1) return toast('Nothing to redo');
  histIdx++;
  restoreFrom(histStack[histIdx]);
}

/* ---- session persistence ---- */
let saveTimer = null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      const usedIds = new Set();
      comp.mockups.forEach(mk=>{ if (mk.screenshot) usedIds.add(mk.screenshot.src); });
      if (comp.frame.image.src) usedIds.add(comp.frame.image.src);
      const images = {};
      usedIds.forEach(id=>{ if (IMAGES[id]) images[id] = IMAGES[id]; });
      const payload = JSON.stringify({comp, images});
      if (payload.length < 4200000) localStorage.setItem('stage-session', payload);
      else localStorage.setItem('stage-session', JSON.stringify({comp, images:{}}));
    }catch(e){
      try{ localStorage.setItem('stage-session', JSON.stringify({comp, images:{}})); }catch(e2){}
    }
  }, 800);
}
function restoreSession(){
  try{
    const raw = localStorage.getItem('stage-session');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.comp || data.comp.version !== 1) return false;
    comp = data.comp;
    Object.assign(IMAGES, data.images || {});
    comp.mockups.forEach(mk=>{ if (mk.screenshot && !IMAGES[mk.screenshot.src]) mk.screenshot = null; });
    if (comp.frame.image.src && !IMAGES[comp.frame.image.src]) comp.frame.image.src = null;
    return true;
  }catch(e){ return false; }
}

/* ---- saved styles (composition minus screenshot) ---- */
function loadStyles(){
  try{ return JSON.parse(localStorage.getItem('stage-styles') || '[]'); }catch(e){ return []; }
}
function saveStyles(list){ try{ localStorage.setItem('stage-styles', JSON.stringify(list)); }catch(e){ toast('Could not save — storage full'); } }
function renderSavedList(){
  const wrap = $('savedList');
  wrap.textContent = '';
  const list = loadStyles();
  if (!list.length){
    const n = el('div','note'); n.textContent = 'Save a look you use often — screenshots stay out of it.';
    wrap.appendChild(n);
    return;
  }
  list.forEach((item, i)=>{
    const row = el('div','saved-item');
    const b = el('button','load'); b.textContent = item.name;
    b.addEventListener('click', ()=>{
      const keepShot = comp.mockups[0].screenshot;
      comp = JSON.parse(JSON.stringify(item.comp));
      comp.mockups.forEach(mk=>mk.screenshot = keepShot ? JSON.parse(JSON.stringify(keepShot)) : null);
      buildPanels(); renderMain(); buildRail(); syncMeta(); commitNow(); scheduleSave();
      toast(`Loaded “${item.name}”`);
    });
    const d = el('button','del'); d.textContent = '✕'; d.title = 'Delete';
    d.addEventListener('click', ()=>{
      const l = loadStyles(); l.splice(i,1); saveStyles(l); renderSavedList();
    });
    row.append(b, d);
    wrap.appendChild(row);
  });
}
function saveCurrentStyle(){
  const name = prompt('Name this style:', comp.layoutPresetId ? `${LAYOUT_BY_ID[comp.layoutPresetId]?.name || 'Stage'} look` : 'My look');
  if (!name) return;
  const list = loadStyles();
  list.unshift({ name: name.slice(0,40), comp: compForShare() });
  saveStyles(list.slice(0,20));
  renderSavedList();
  toast('Style saved');
}
$('btnSaveStyle').addEventListener('click', saveCurrentStyle);

/* ---- randomise: constrained to combinations that look intentional ---- */
const RANDOM_LAYOUT_POOL = ['centered','hero','tilted','float','diagonal','corner','bleed-bottom'];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randomise(){
  const brandGrads = GRAD_PRESETS.slice(0, 15);
  const bgRoll = Math.random();
  mutate(c=>{
    const f = c.frame;
    f.transparent = false;
    if (bgRoll < 0.42){                                     // gradient
      const cols = pick(brandGrads);
      f.background = { ...f.background, type:'gradient',
        mode: Math.random() < 0.25 ? 'mesh' : pick(['linear','linear','radial']),
        angle: Math.round(Math.random()*360),
        stops: cols.map((col,i)=>({color:col, position:Math.round(i*100/(cols.length-1))})),
      };
      if (f.background.mode === 'mesh'){
        const base = cols.length >= 4 ? cols : cols.concat(pick(brandGrads)).slice(0,4);
        const pts = [[.18,.2],[.84,.22],[.2,.82],[.82,.8],[.5,.45],[.62,.62]];
        f.background.meshPoints = base.map((col,i)=>({x:pts[i][0]+(Math.random()-.5)*.1, y:pts[i][1]+(Math.random()-.5)*.1, color:col}));
      }
      f.grain = 6 + Math.round(Math.random()*16);
    } else if (bgRoll < 0.62){                              // atmosphere
      const eff = pick(['aurora','cosmic','grid','spotlight']);
      f.background = {...f.background, type:'atmosphere'};
      f.atmo = { effect: eff, params: eff === 'aurora' ? {hue: Math.round(Math.random()*80)}
        : eff === 'grid' ? {hue: pick([205, 260, 330, 40])}
        : eff === 'cosmic' ? {hue: pick([258, 300, 210])} : {} };
      f.grain = 8 + Math.round(Math.random()*10);
    } else if (bgRoll < 0.82){                              // solid
      f.background = {...f.background, type:'solid'};
      f.solid.color = pick(['#0B0B0F','#14141A','#1C1C22','#FAFAF8','#EFEFEA', pick(BRAND)]);
      f.grain = 8 + Math.round(Math.random()*14);
    } else {                                                // texture
      f.background = {...f.background, type:'texture'};
      f.texture = { textureId: pick(['paper','riso','halftone','concrete','linen']),
        blendMode: pick(['overlay','soft-light','multiply']),
        opacity: 30 + Math.round(Math.random()*35),
        tint: Math.random() < 0.5 ? pick(BRAND) : null,
        base: pick(['#14141A','#EFEFEA','#FAFAF8','#1C1C22']) };
      f.grain = 4 + Math.round(Math.random()*10);
    }
    f.vignette.amount = Math.random() < 0.4 ? Math.round(Math.random()*22) : 0;
    // shadow tuned to backdrop
    const dark = luma(bgAccent(f)) < 0.45;
    c.mockups.forEach(mk=>{
      const sp = pick(['soft','dramatic','floating','long']);
      mk.shadow = { presetId:sp, ...SHADOW_PRESETS[sp],
        color: Math.random() < 0.5 ? darken(bgAccent(f), .55) : '#000000',
        opacity: SHADOW_PRESETS[sp].opacity * (dark ? 1.15 : 0.9) };
    });
  }, {rebuildPanels:true});
  const pool = comp.frame.height > comp.frame.width
    ? RANDOM_LAYOUT_POOL
    : RANDOM_LAYOUT_POOL.filter(l=>l!=='bleed-bottom');
  applyLayout(pick(pool), true);
}
$('btnRandom').addEventListener('click', randomise);

/* ---- keyboard shortcuts ---- */
addEventListener('keydown', e=>{
  const inField = /^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName);
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key.toLowerCase() === 'z'){
    if (inField) return;
    e.preventDefault();
    e.shiftKey ? redo() : undo();
  }
  else if (mod && e.key.toLowerCase() === 'e'){ e.preventDefault(); doExport(); }
  else if (mod && e.key.toLowerCase() === 's'){ e.preventDefault(); saveCurrentStyle(); }
  else if (mod && e.key === '0'){ e.preventDefault(); ui.zoom = 'fit'; ui.panX = ui.panY = 0; renderMain(); }
  else if (mod && e.key.toLowerCase() === 'c'){
    if (inField || String(getSelection() || '')) return;
    e.preventDefault(); doCopy();
  }
  else if (!mod && !inField){
    if (e.key.toLowerCase() === 'r'){ e.preventDefault(); randomise(); }
    else if (/^[1-9]$/.test(e.key)){
      const L = LAYOUTS[+e.key-1];
      if (L) applyLayout(L.id, true);
    }
  }
});

/* ---- boot ---- */
(function boot(){
  const fromHash = tryLoadHash();
  if (!fromHash) restoreSession();
  buildPanels();
  renderMain();
  buildRail();
  renderSavedList();
  syncMeta();
  commitNow();
})();
</script>

  <div style="font-family:'Porkys','Arial Rounded MT Bold',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:38px;display:flex;letter-spacing:.2em;"><span style="display:inline-block;--r:-7deg;color:#F42C04;animation:nbBnc 1.05s ease-in-out 0s infinite">N</span><span style="display:inline-block;--r:5deg;color:#FF6FAE;animation:nbBnc 1.05s ease-in-out .08s infinite">I</span><span style="display:inline-block;--r:-4deg;color:#FCCA46;animation:nbBnc 1.05s ease-in-out .16s infinite">M</span><span style="display:inline-block;--r:6deg;color:#2DC7FF;animation:nbBnc 1.05s ease-in-out .24s infinite">B</span><span style="display:inline-block;--r:-6deg;color:#645DD7;animation:nbBnc 1.05s ease-in-out .32s infinite">L</span><span style="display:inline-block;--r:8deg;color:#CBA0FF;animation:nbBnc 1.05s ease-in-out .4s infinite">E</span></div>
  <div style="font:700 11px 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#5c5c66;letter-spacing:.26em;text-transform:uppercase">Opening Stage</div>
</div>

if(document.readyState==='complete')hide();else window.addEventListener('load',hide);
setTimeout(hide,2600);})();</script>

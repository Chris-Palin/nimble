<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage — Nimble</title>
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-32.png">
<link rel="stylesheet" href="../../assets/theme.css?v=7">
<script src="../../assets/theme.js"></script>
<style>
  :root, :root[data-theme="dark"]{
    --bg:#0b0b0f; --panel:#111116; --panel2:#17171d; --panel3:#1e1e26; --line:#232329; --line2:#31313a;
    --ink:#f4f4f5; --text:#f4f4f5; --muted:#8f8f98; --faint:#5c5c66; --range-track:#2f2f37;
    --red:#F42C04; --pink:#FF6FAE; --yellow:#FCCA46; --blue:#2DC7FF; --indigo:#645DD7; --lavender:#CBA0FF;
    --accent:#F42C04; --focus:#2DC7FF; --radius:9px;
    --canvas-bed:#101014;
  }
  :root[data-theme="light"]{
    --bg:#ffffff; --panel:#fafafa; --panel2:#f1f1f3; --panel3:#e9e9ec; --line:#e9e9e9; --line2:#d9d9d9;
    --ink:#111111; --text:#111111; --muted:#71717a; --faint:#a1a1aa; --range-track:#d8d8df;
    --canvas-bed:#ececef;
  }
  @font-face{font-family:'Porkys';src:url('../../assets/PORKYS_.ttf') format('truetype');font-display:swap;}
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); display:flex; flex-direction:column;
    overflow:hidden; font-size:13px; -webkit-font-smoothing:antialiased;
  }
  :focus-visible{outline:2px solid var(--focus); outline-offset:2px; border-radius:4px;}
  .app{flex:1; display:flex; min-height:0;}

  /* ============================ left panel ============================ */
  aside.left{
    width:308px; flex:0 0 308px; display:flex; flex-direction:column; min-height:0;
    background:var(--bg); border-right:1px solid var(--line);
  }
  .acc{display:flex; flex-direction:column; min-height:0; border-bottom:1px solid var(--line);}
  .acc.open{flex:1;}
  .acc-head{
    display:flex; align-items:center; gap:9px; padding:13px 16px; flex:none;
    background:transparent; border:0; cursor:pointer; text-align:left; width:100%;
    color:var(--muted); font-family:inherit;
  }
  .acc-head .acc-title{
    font-family:'Porkys','Arial Rounded MT Bold',sans-serif; font-size:17px; letter-spacing:.06em;
    text-transform:uppercase; color:inherit; transform:translateY(1px);
  }
  .acc.open .acc-head{color:var(--ink);}
  .acc-head .chev{margin-left:auto; font-size:10px; color:var(--faint); transition:transform .2s;}
  .acc.open .acc-head .chev{transform:rotate(90deg);}
  .acc-head .dot{width:7px; height:7px; border-radius:50%; flex:none;}
  .acc-body{
    display:none; overflow-y:auto; min-height:0; padding:2px 14px 30px;
  }
  .acc.open .acc-body{display:block;}
  .acc-body::-webkit-scrollbar{width:8px;}
  .acc-body::-webkit-scrollbar-thumb{background:#2c2c33; border-radius:4px;}
  :root[data-theme="light"] .acc-body::-webkit-scrollbar-thumb{background:#c9c7c0;}

  section{margin-bottom:20px;}
  section h2{
    font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.2em; color:var(--faint);
    margin-bottom:10px; display:flex; align-items:center; gap:8px;
  }
  section h2 .h2-action{
    margin-left:auto; background:none; border:0; color:var(--faint); cursor:pointer; font:inherit;
    letter-spacing:.05em; text-transform:none; font-size:10px;
  }
  section h2 .h2-action:hover{color:var(--ink);}
  .row{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .row label{flex:0 0 auto; color:var(--muted); min-width:78px; font-size:12px;}
  .row .val{margin-left:auto; color:var(--muted); font-variant-numeric:tabular-nums; min-width:38px; text-align:right;}
  .note{color:var(--muted); font-size:11px; line-height:1.5; margin-top:6px;}

  input[type=number], input[type=text], select{
    background:var(--panel); border:1px solid var(--line); color:var(--ink);
    border-radius:8px; padding:6px 8px; font-size:12.5px; width:100%;
    font-variant-numeric:tabular-nums; font-family:inherit;
  }
  input[type=number]{width:60px; flex:none;}
  input[type=number]:focus, input[type=text]:focus, select:focus{outline:none; border-color:var(--focus);}
  input[type=range]{
    -webkit-appearance:none; appearance:none; flex:1; height:4px; border-radius:2px;
    background:var(--range-track); outline:none; min-width:40px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--ink); cursor:pointer; border:2px solid var(--bg);
  }
  input[type=range]:focus-visible{outline:2px solid var(--focus); outline-offset:4px;}
  input[type=color]{
    -webkit-appearance:none; appearance:none; width:32px; height:26px; border:1px solid var(--line);
    border-radius:6px; background:none; padding:0; cursor:pointer; flex:none;
  }
  input[type=color]::-webkit-color-swatch-wrapper{padding:2px;}
  input[type=color]::-webkit-color-swatch{border:none; border-radius:4px;}
  input[type=checkbox]{accent-color:var(--accent); width:14px; height:14px;}
  button{
    font-family:inherit; border:1px solid var(--line); background:var(--panel); color:var(--ink);
    border-radius:9px; padding:7px 10px; font-size:12px; font-weight:600; letter-spacing:-.01em;
    cursor:pointer; transition:background .15s,border-color .15s,color .15s,filter .15s;
  }
  button:hover{background:var(--panel2); border-color:var(--line2);}
  button.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  button.primary:hover{filter:brightness(1.08);}
  button.small{padding:5px 8px; font-size:11px;}
  .btnrow{display:flex; gap:7px; flex-wrap:wrap;}
  .btnrow button{flex:1;}

  /* segmented control */
  .seg{display:flex; background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:2px; gap:2px;}
  .seg button{
    flex:1; border:0; background:transparent; color:var(--muted); border-radius:7px;
    padding:6px 4px; font-size:11px; font-weight:600;
  }
  .seg button:hover{background:var(--panel2); color:var(--ink);}
  .seg button.on{background:var(--panel3); color:var(--ink); box-shadow:inset 0 0 0 1px var(--line2);}
  .seg.mini button{padding:4px 3px; font-size:10.5px;}

  /* swatches */
  .swatches{display:grid; grid-template-columns:repeat(8,1fr); gap:6px; margin-bottom:8px;}
  .sw{
    aspect-ratio:1; border-radius:7px; border:1px solid rgba(128,128,140,.25); cursor:pointer; padding:0;
    background:none; position:relative;
  }
  .sw.on{box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--focus);}
  .sw:hover{transform:scale(1.08);}

  /* chips (devices, presets, textures) */
  .chips{display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:8px;}
  .chips.four{grid-template-columns:repeat(4,1fr);}
  .chip{
    display:flex; flex-direction:column; align-items:center; gap:5px;
    padding:9px 4px 7px; border-radius:9px; border:1px solid var(--line); background:var(--panel);
    cursor:pointer; color:var(--muted); font-size:10px; font-weight:600; text-align:center;
  }
  .chip:hover{border-color:var(--line2); color:var(--ink); background:var(--panel2);}
  .chip.on{border-color:var(--focus); color:var(--ink); box-shadow:0 0 0 1px var(--focus);}
  .chip svg{display:block;}
  .chip .cthumb{width:100%; aspect-ratio:16/10; border-radius:5px; border:1px solid rgba(128,128,140,.2); background-size:cover; background-position:center;}

  /* gradient stops editor */
  .stopsbar{
    position:relative; height:26px; border-radius:7px; border:1px solid var(--line); margin-bottom:14px;
    cursor:copy;
  }
  .stop{
    position:absolute; top:50%; width:16px; height:16px; border-radius:50%;
    border:2.5px solid #fff; box-shadow:0 1px 5px rgba(0,0,0,.55); transform:translate(-50%,-50%);
    cursor:grab; padding:0;
  }
  .stop.sel{box-shadow:0 0 0 2px var(--focus), 0 1px 5px rgba(0,0,0,.55);}

  /* ============================ centre ============================ */
  main.stage{
    flex:1; display:flex; flex-direction:column; min-width:0; position:relative;
    background:
      radial-gradient(1200px 700px at 50% -10%, rgba(100,93,215,.05), transparent 60%),
      var(--canvas-bed);
  }
  #canvasWrap{
    flex:1; position:relative; overflow:hidden; min-height:0;
    display:flex; align-items:center; justify-content:center;
  }
  #canvasWrap.panning{cursor:grab;}
  #canvasWrap.panning:active{cursor:grabbing;}
  #compScaler{
    position:relative; flex:none;
    box-shadow:0 24px 70px -30px rgba(0,0,0,.65), 0 0 0 1px rgba(128,128,140,.14);
    border-radius:2px;
  }
  #compScaler.reshape{transition:width .5s cubic-bezier(.3,1.25,.45,1), height .5s cubic-bezier(.3,1.25,.45,1);}
  #compScaler.transparent-bg{
    background-image:
      linear-gradient(45deg, rgba(128,128,140,.18) 25%, transparent 25%, transparent 75%, rgba(128,128,140,.18) 75%),
      linear-gradient(45deg, rgba(128,128,140,.18) 25%, transparent 25%, transparent 75%, rgba(128,128,140,.18) 75%);
    background-size:20px 20px; background-position:0 0, 10px 10px;
  }
  #compHost{position:absolute; left:0; top:0; transform-origin:0 0; overflow:visible;}

  /* snap guides */
  .guide{position:absolute; background:var(--focus); opacity:.85; pointer-events:none; z-index:40;}
  .guide.v{width:1px; top:0; bottom:0;}
  .guide.h{height:1px; left:0; right:0;}

  /* mesh / spotlight handles */
  .bghandle{
    position:absolute; width:16px; height:16px; border-radius:50%;
    border:2.5px solid #fff; box-shadow:0 1px 6px rgba(0,0,0,.6), inset 0 0 0 1px rgba(0,0,0,.2);
    transform:translate(-50%,-50%); cursor:grab; touch-action:none; z-index:30;
  }
  .bghandle.sel{box-shadow:0 0 0 3px var(--focus), 0 2px 10px rgba(0,0,0,.7);}

  /* canvas bar */
  .canvas-bar{
    flex:none; display:flex; align-items:center; gap:10px; padding:9px 14px;
    border-top:1px solid var(--line); background:var(--bg); font-size:11.5px; color:var(--muted);
  }
  .canvas-bar .dims{font-variant-numeric:tabular-nums;}
  .canvas-bar .zoomctl{display:flex; align-items:center; gap:4px;}
  .canvas-bar .grow{flex:1;}
  .canvas-bar .privacy{font-size:10.5px; color:var(--faint); white-space:nowrap;}
  .canvas-bar button{padding:5px 9px; font-size:11px;}

  /* drop overlay */
  #dropOverlay{
    position:absolute; inset:12px; z-index:60; display:none; align-items:center; justify-content:center;
    border:2px dashed var(--accent); border-radius:14px; background:rgba(244,44,4,.07);
    color:var(--ink); font-size:15px; font-weight:700; pointer-events:none; backdrop-filter:blur(2px);
  }
  #dropOverlay.show{display:flex;}

  /* suggestion chip */
  #suggestChip{
    position:absolute; left:50%; bottom:58px; transform:translateX(-50%) translateY(6px);
    z-index:55; display:flex; align-items:center; gap:10px;
    background:var(--panel2); border:1px solid var(--line2); border-radius:999px;
    padding:8px 8px 8px 14px; font-size:12px; color:var(--ink);
    box-shadow:0 12px 34px rgba(0,0,0,.45); opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s;
  }
  #suggestChip.show{opacity:1; transform:translateX(-50%); pointer-events:auto;}
  #suggestChip button{border-radius:999px; padding:5px 11px; font-size:11.5px;}
  #suggestChip .x{border:0; background:none; color:var(--faint); font-size:14px; padding:4px 8px;}
  #suggestChip .x:hover{color:var(--ink);}

  /* ============================ right panel ============================ */
  aside.right{
    width:196px; flex:0 0 196px; display:flex; flex-direction:column; min-height:0;
    background:var(--bg); border-left:1px solid var(--line);
  }
  aside.right .rp-head{
    flex:none; padding:13px 16px 8px; font-size:9.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.2em; color:var(--faint); display:flex; align-items:center;
  }
  aside.right .rp-head .custom-flag{margin-left:auto; color:var(--yellow); letter-spacing:.05em; display:none;}
  aside.right.custom .rp-head .custom-flag{display:inline;}
  #presetRail{
    flex:1; overflow-y:auto; min-height:0; padding:4px 14px 16px;
    display:flex; flex-direction:column; gap:10px;
  }
  #presetRail::-webkit-scrollbar{width:8px;}
  #presetRail::-webkit-scrollbar-thumb{background:#2c2c33; border-radius:4px;}
  :root[data-theme="light"] #presetRail::-webkit-scrollbar-thumb{background:#c9c7c0;}
  .lp{
    position:relative; border:1px solid var(--line); border-radius:10px; background:var(--panel);
    cursor:pointer; padding:0; overflow:hidden; flex:none; width:100%;
    transition:border-color .15s, box-shadow .15s;
  }
  .lp:hover{border-color:var(--line2);}
  .lp.on{border-color:var(--focus); box-shadow:0 0 0 1px var(--focus);}
  .lp .lp-thumb{width:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#0d0d12;}
  .lp .lp-name{
    position:absolute; left:6px; bottom:6px; padding:2px 7px; border-radius:5px;
    background:rgba(10,10,14,.62); color:#e8e8ee; font-size:9.5px; font-weight:600; letter-spacing:.03em;
    backdrop-filter:blur(3px); pointer-events:none;
  }
  .rp-foot{flex:none; border-top:1px solid var(--line); padding:10px 14px 12px;}
  .rp-foot h3{font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.2em; color:var(--faint); margin-bottom:8px;}
  #savedList{display:flex; flex-direction:column; gap:5px; max-height:130px; overflow-y:auto; margin-bottom:8px;}
  .saved-item{display:flex; align-items:center; gap:6px;}
  .saved-item button.load{flex:1; text-align:left; font-size:11px; padding:6px 8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .saved-item button.del{border:0; background:none; color:var(--faint); padding:4px 5px; font-size:12px;}
  .saved-item button.del:hover{color:var(--red);}

  /* ============================ header extras ============================ */
  .tool-actions .icon-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    height:34px; min-height:34px; padding:0 12px; border-radius:999px;
  }
  .tool-actions .export-btn{
    background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;
  }
  .tool-actions .export-btn:hover{filter:brightness(1.08); background:var(--accent);}

  /* export popover */
  #exportPop{
    position:absolute; top:60px; right:14px; z-index:80; width:290px;
    background:var(--panel); border:1px solid var(--line2); border-radius:14px;
    box-shadow:0 24px 70px rgba(0,0,0,.55); padding:14px; display:none;
  }
  #exportPop.show{display:block;}
  #exportPop h3{font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.2em; color:var(--faint); margin:12px 0 8px;}
  #exportPop h3:first-child{margin-top:0;}
  #batchList{display:grid; grid-template-columns:1fr 1fr; gap:4px 10px; margin-bottom:8px;}
  #batchList label{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); cursor:pointer;}

  .toast{
    position:fixed; bottom:52px; left:50%; transform:translate(-50%,8px); background:var(--panel2); border:1px solid var(--line2);
    padding:9px 16px; border-radius:999px; box-shadow:0 10px 34px rgba(0,0,0,.6); opacity:0;
    transition:opacity .25s, transform .25s; pointer-events:none; z-index:200; font-size:12.5px;
  }
  .toast.show{opacity:1; transform:translate(-50%,0);}

  /* mockup drag affordance */
  .mockup-hit{cursor:grab;}
  .mockup-hit:active{cursor:grabbing;}

  @media (max-width:1060px){
    aside.left{width:264px; flex-basis:264px;}
    aside.right{width:160px; flex-basis:160px;}
  }
  @media (max-width:840px){
    aside.right{display:none;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition-duration:.01ms !important; animation-duration:.01ms !important;}
  }
</style>
</head>
<body>

<header class="tool-header">
  <div class="tool-home-slot">
    <a class="nimble-home" href="../../index.html">Nimble</a>
  </div>
  <div class="tool-heading">
    <h1 class="tool-title">Stage</h1>
    <div class="tool-meta" id="headMeta">1080 × 1350</div>
  </div>
  <div class="tool-actions">
    <button class="icon-btn" id="btnRandom" title="Randomise (R)">🎲<span class="hide-sm"> Random</span></button>
    <button class="icon-btn" id="btnCopy" title="Copy image to clipboard (⌘C)">Copy</button>
    <button class="icon-btn export-btn" id="btnExportOpen" title="Export (⌘E)">Export ↓</button>
    <button class="theme-toggle" data-theme-toggle type="button"><span class="theme-toggle__icon">☾</span></button>
  </div>
</header>

<div class="app">

  <aside class="left" id="panelLeft">
    <div class="acc open" id="accFrame">
      <button class="acc-head" data-acc="frame" aria-expanded="true">
        <span class="dot" style="background:var(--indigo)"></span>
        <span class="acc-title">Frame</span>
        <span class="chev">▶</span>
      </button>
      <div class="acc-body" id="frameBody"></div>
    </div>
    <div class="acc" id="accMockup">
      <button class="acc-head" data-acc="mockup" aria-expanded="false">
        <span class="dot" style="background:var(--blue)"></span>
        <span class="acc-title">Mockup</span>
        <span class="chev">▶</span>
      </button>
      <div class="acc-body" id="mockupBody"></div>
    </div>
  </aside>

  <main class="stage">
    <div id="canvasWrap">
      <div id="compScaler">
        <div id="compHost"></div>
      </div>
      <div id="dropOverlay">Drop to place</div>
      <div id="suggestChip" role="status"></div>
    </div>
    <div class="canvas-bar">
      <span class="dims" id="barDims">1080 × 1350</span>
      <span>·</span>
      <div class="zoomctl">
        <button id="btnZoomFit" title="Zoom to fit (⌘0)">Fit</button>
        <button id="btnZoom100" title="Zoom to 100%">100%</button>
        <span id="zoomLabel" style="min-width:38px; text-align:right; font-variant-numeric:tabular-nums;">—</span>
      </div>
      <div class="grow"></div>
      <span class="privacy">Images never leave your browser — no uploads, no server.</span>
    </div>
  </main>

  <aside class="right" id="panelRight">
    <div class="rp-head">Layout <span class="custom-flag">Custom</span></div>
    <div id="presetRail"></div>
    <div class="rp-foot">
      <h3>Saved styles</h3>
      <div id="savedList"></div>
      <div class="btnrow">
        <button class="small" id="btnSaveStyle" title="Save composition style (⌘S)">Save current</button>
      </div>
    </div>
  </aside>

</div>

<div id="exportPop" role="dialog" aria-label="Export"></div>
<div class="toast" id="toast" role="status"></div>
<input type="file" id="filePick" accept="image/*" style="display:none">
<input type="file" id="bgFilePick" accept="image/*" style="display:none">

<script>
"use strict";
/* ================================================================== */
/* PART A — constants, utils, state                                    */
/* ================================================================== */
const $ = id => document.getElementById(id);
const clamp = (v,a,b) => Math.min(b, Math.max(a, v));
const uid = () => Math.random().toString(36).slice(2,9);
const el = (tag, cls, css) => {
  const d = document.createElement(tag);
  if (cls) d.className = cls;
  if (css) Object.assign(d.style, css);
  return d;
};
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
const OKLAB_OK = CSS.supports('background', 'linear-gradient(in oklab, red, blue)');

function hexToRgb(hex){
  let h = hex.replace('#','');
  if (h.length === 3) h = h.split('').map(c=>c+c).join('');
  const n = parseInt(h, 16);
  return [n>>16&255, n>>8&255, n&255];
}
function rgbToHex(r,g,b){ return '#'+[r,g,b].map(v=>clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join(''); }
function withAlpha(hex, a){ const [r,g,b] = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }
function luma(hex){ const [r,g,b] = hexToRgb(hex); return (0.2126*r + 0.7152*g + 0.0722*b)/255; }
function mixHex(a, b, t){
  const A = hexToRgb(a), B = hexToRgb(b);
  return rgbToHex(A[0]+(B[0]-A[0])*t, A[1]+(B[1]-A[1])*t, A[2]+(B[2]-A[2])*t);
}
function darken(hex, t){ return mixHex(hex, '#000000', t); }
function fmtPx(w,h){ return `${w} × ${h}`; }

/* ---- brand ---- */
const BRAND = ['#F42C04','#FF6FAE','#FCCA46','#2DC7FF','#645DD7','#CBA0FF'];
const NEUTRALS = ['#FAFAF8','#EFEFEA','#D8D8D4','#A6A6A8','#6E6E74','#3A3A42','#1C1C22','#0B0B0F'];

/* ---- frame dimension presets ---- */
const DIM_GROUPS = [
  ['Instagram', [
    ['ig-square','Square 1:1',1080,1080],
    ['ig-portrait','Portrait 4:5',1080,1350],
    ['ig-story','Story / Reel 9:16',1080,1920],
  ]],
  ['X / Twitter', [
    ['x-post','Post 16:9',1600,900],
    ['x-post43','Post 4:3',1200,900],
    ['x-header','Header 3:1',1500,500],
  ]],

<script>
/* ================================================================== */
/* PART B — backgrounds: atmosphere painters + procedural textures     */
/* ================================================================== */
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hueShift(hex, deg){
  if (!deg) return hex;
  let [r,g,b] = hexToRgb(hex).map(v=>v/255);
  const mx = Math.max(r,g,b), mn = Math.min(r,g,b), d = mx-mn;
  let h = 0;
  if (d){
    if (mx === r) h = ((g-b)/d) % 6;
    else if (mx === g) h = (b-r)/d + 2;
    else h = (r-g)/d + 4;
    h *= 60; if (h < 0) h += 360;
  }
  const l = (mx+mn)/2, s = d === 0 ? 0 : d/(1-Math.abs(2*l-1));
  h = (h + deg) % 360;
  const c = (1-Math.abs(2*l-1))*s, x = c*(1-Math.abs((h/60)%2-1)), m = l-c/2;
  let rgb = h<60?[c,x,0]:h<120?[x,c,0]:h<180?[0,c,x]:h<240?[0,x,c]:h<300?[x,0,c]:[c,0,x];
  return rgbToHex((rgb[0]+m)*255,(rgb[1]+m)*255,(rgb[2]+m)*255);
}

/* ---------- gradient CSS ---------- */
function stopsCSS(stops){
  return stops.slice().sort((a,b)=>a.position-b.position)
    .map(s=>`${s.color} ${s.position}%`).join(', ');
}
function gradientCSS(bg){
  const interp = OKLAB_OK ? ' in oklab' : '';
  const x = bg.x ?? 50, y = bg.y ?? 50;
  if (bg.mode === 'linear') return `linear-gradient(${bg.angle}deg${interp}, ${stopsCSS(bg.stops)})`;
  if (bg.mode === 'radial') return `radial-gradient(circle at ${x}% ${y}%${interp}, ${stopsCSS(bg.stops)})`;
  if (bg.mode === 'conic')  return `conic-gradient(from ${bg.angle}deg at ${x}% ${y}%${interp}, ${stopsCSS(bg.stops)})`;
  return meshCSS(bg);
}
function meshCSS(bg){
  const pts = bg.meshPoints || [];
  const layers = pts.map(p =>
    `radial-gradient(at ${(p.x*100).toFixed(1)}% ${(p.y*100).toFixed(1)}%, ${p.color} 0%, ${withAlpha(p.color,0)} 62%)`);
  // base = blend of all points so uncovered corners never go black
  let base = pts.length ? pts.reduce((acc,p)=>mixHex(acc,p.color,1/2), pts[0].color) : '#645DD7';
  return layers.join(', ') + `, linear-gradient(${base}, ${base})`;
}

/* ---------- grain / dither tiles ---------- */
let _grainURL = null, _ditherURL = null;
function grainURL(){
  if (_grainURL) return _grainURL;
  const s = 192, c = el('canvas'); c.width = c.height = s;
  const ctx = c.getContext('2d'), d = ctx.createImageData(s,s);
  const rnd = mulberry32(7);
  for (let i=0;i<d.data.length;i+=4){
    const v = rnd()*255;
    d.data[i]=v; d.data[i+1]=v; d.data[i+2]=v; d.data[i+3]=255*(0.35+rnd()*0.65);
  }
  ctx.putImageData(d,0,0);
  return _grainURL = c.toDataURL();
}
function ditherURL(){
  if (_ditherURL) return _ditherURL;
  const s = 128, c = el('canvas'); c.width = c.height = s;
  const ctx = c.getContext('2d'), d = ctx.createImageData(s,s);
  const rnd = mulberry32(31);
  for (let i=0;i<d.data.length;i+=4){
    const v = rnd() > 0.5 ? 255 : 0;
    d.data[i]=d.data[i+1]=d.data[i+2]=v; d.data[i+3]=14;
  }
  ctx.putImageData(d,0,0);
  return _ditherURL = c.toDataURL();
}

/* ---------- procedural textures ---------- */
const TEX_CACHE = {};
function textureURL(id){
  if (TEX_CACHE[id]) return TEX_CACHE[id];
  const s = 420, c = el('canvas'); c.width = c.height = s;
  const x = c.getContext('2d');
  const rnd = mulberry32(id.length * 977 + id.charCodeAt(0));
  const noise = (alpha, n=9000, lo=0, hi=255) => {
    for (let i=0;i<n;i++){
      const v = lo + rnd()*(hi-lo);
      x.fillStyle = `rgba(${v},${v},${v},${alpha})`;
      x.fillRect(rnd()*s, rnd()*s, 1.4, 1.4);
    }
  };
  switch(id){
    case 'paper':
      x.fillStyle = '#ECEAE4'; x.fillRect(0,0,s,s); noise(.10, 14000);
      x.strokeStyle = 'rgba(120,115,105,.06)';
      for (let i=0;i<300;i++){
        x.beginPath();
        const px = rnd()*s, py = rnd()*s, a = rnd()*Math.PI;
        x.moveTo(px,py); x.lineTo(px+Math.cos(a)*(4+rnd()*10), py+Math.sin(a)*(4+rnd()*10)); x.stroke();
      }
      break;
    case 'kraft':
      x.fillStyle = '#B98A54'; x.fillRect(0,0,s,s); noise(.12, 16000, 60, 210);
      x.strokeStyle = 'rgba(90,60,25,.09)';
      for (let i=0;i<160;i++){
        const py = rnd()*s;
        x.beginPath(); x.moveTo(rnd()*s, py); x.lineTo(rnd()*s, py + (rnd()-.5)*6); x.stroke();
      }
      break;
    case 'concrete':{
      x.fillStyle = '#9C9C9A'; x.fillRect(0,0,s,s);
      for (let i=0;i<60;i++){
        const g = x.createRadialGradient(rnd()*s, rnd()*s, 0, rnd()*s, rnd()*s, 30+rnd()*90);
        const v = 120+rnd()*70;
        g.addColorStop(0, `rgba(${v},${v},${v},.20)`); g.addColorStop(1, 'rgba(0,0,0,0)');
        x.fillStyle = g; x.fillRect(0,0,s,s);
      }
      noise(.16, 15000, 30, 200);
      break;
    }
    case 'metal':{
      const g = x.createLinearGradient(0,0,0,s);
      g.addColorStop(0,'#B9BCC2'); g.addColorStop(.5,'#D8DBE0'); g.addColorStop(1,'#AEB1B8');
      x.fillStyle = g; x.fillRect(0,0,s,s);
      for (let i=0;i<1400;i++){
        const py = rnd()*s, a = .02+rnd()*.09, v = rnd()>.5?255:60;
        x.strokeStyle = `rgba(${v},${v},${v},${a})`;
        x.beginPath(); x.moveTo(0,py); x.lineTo(s,py+(rnd()-.5)*1.5); x.stroke();
      }
      break;
    }
    case 'linen':{
      x.fillStyle = '#D9D2C4'; x.fillRect(0,0,s,s);
      x.strokeStyle = 'rgba(115,105,85,.16)';
      for (let i=0;i<s;i+=3){ x.beginPath(); x.moveTo(i,0); x.lineTo(i,s); x.stroke(); }
      x.strokeStyle = 'rgba(255,252,240,.14)';
      for (let i=0;i<s;i+=3){ x.beginPath(); x.moveTo(0,i); x.lineTo(s,i); x.stroke(); }
      noise(.05, 6000);
      break;
    }
    case 'marble':{
      x.fillStyle = '#EDEDF0'; x.fillRect(0,0,s,s);
      for (let v=0; v<10; v++){
        x.strokeStyle = `rgba(120,125,140,${.08+rnd()*.12})`;
        x.lineWidth = .6 + rnd()*1.8;
        x.beginPath();
        let px = rnd()*s, py = 0;
        x.moveTo(px,py);
        while (py < s){ px += (rnd()-.5)*46; py += 14+rnd()*26; x.lineTo(px,py); }
        x.stroke();
      }
      noise(.04, 5000);
      break;
    }
    case 'halftone':{
      x.fillStyle = '#F2F0EA'; x.fillRect(0,0,s,s);
      x.fillStyle = 'rgba(30,30,35,.75)';
      const step = 14;
      for (let ry=0; ry<s+step; ry+=step) for (let rx=0; rx<s+step; rx+=step){
        const ox = (Math.floor(ry/step)%2)*step/2;
        const r = 1.2 + 2.2*(0.5+0.5*Math.sin(rx*.045)*Math.cos(ry*.045));
        x.beginPath(); x.arc(rx+ox, ry, r, 0, 7); x.fill();
      }
      break;
    }
    case 'riso':
      x.fillStyle = '#E8E4DA'; x.fillRect(0,0,s,s); noise(.28, 26000, 20, 160);
      break;
    case 'scanline':{
      x.fillStyle = '#101014'; x.fillRect(0,0,s,s);
      for (let py=0; py<s; py+=4){
        x.fillStyle = 'rgba(210,215,230,.10)'; x.fillRect(0,py,s,1.4);
        x.fillStyle = 'rgba(0,0,0,.35)'; x.fillRect(0,py+2,s,1);
      }
      noise(.05, 4000);
      break;
    }
    case 'foil':{
      x.fillStyle = '#BFC3CC'; x.fillRect(0,0,s,s);
      for (let i=0;i<240;i++){
        const px = rnd()*s, py = rnd()*s, r = 8+rnd()*34, v = 120+rnd()*135;
        x.fillStyle = `rgba(${v},${v},${v+8},${.25+rnd()*.4})`;
        x.beginPath();
        x.moveTo(px+r*Math.cos(0), py+r*Math.sin(0));
        for (let k=1;k<5;k++){ const a = k*1.257 + rnd()*.7; x.lineTo(px+r*Math.cos(a)*(.5+rnd()*.7), py+r*Math.sin(a)*(.5+rnd()*.7)); }
        x.closePath(); x.fill();
      }
      break;
    }
    case 'wood':{
      const g = x.createLinearGradient(0,0,s,0);
      g.addColorStop(0,'#8A5A34'); g.addColorStop(.5,'#9C6A40'); g.addColorStop(1,'#84552F');
      x.fillStyle = g; x.fillRect(0,0,s,s);
      for (let i=0;i<70;i++){
        const px = rnd()*s;
        x.strokeStyle = `rgba(55,32,12,${.10+rnd()*.20})`;
        x.lineWidth = .7+rnd()*2;
        x.beginPath(); x.moveTo(px,0);
        let cx = px;
        for (let py=0; py<=s; py+=22){ cx += (rnd()-.5)*7; x.lineTo(cx,py); }
        x.stroke();
      }
      noise(.06, 6000, 30, 120);
      break;
    }
    case 'denim':{
      x.fillStyle = '#33517A'; x.fillRect(0,0,s,s);
      x.strokeStyle = 'rgba(210,220,240,.13)'; x.lineWidth = 1.2;
      for (let i=-s;i<s*2;i+=4){ x.beginPath(); x.moveTo(i,0); x.lineTo(i+s,s); x.stroke(); }
      x.strokeStyle = 'rgba(10,20,40,.22)';
      for (let i=-s;i<s*2;i+=8){ x.beginPath(); x.moveTo(i+2,0); x.lineTo(i+2+s,s); x.stroke(); }
      noise(.05, 5000);
      break;
    }

}

/* ---------- atmosphere painters ---------- */
/* Each paints logical frame units onto ctx already scaled; t in seconds. */
const ATMO_PAINTERS = {
  aurora(ctx, w, h, p, t){
    const speed = (p.speed ?? 30)/100, inten = (p.intensity ?? 70)/100;
    const blur = (p.blur ?? 62)/100, shift = p.hue ?? 0;
    ctx.fillStyle = hueShift('#0B0A14', shift*.3); ctx.fillRect(0,0,w,h);
    const cols = ['#645DD7','#2DC7FF','#FF6FAE','#F42C04'].map(c=>hueShift(c, shift));
    const R = Math.max(w,h);
    ctx.save();
    ctx.filter = `blur(${Math.round(R*0.055*(0.4+blur))}px)`;
    ctx.globalCompositeOperation = 'lighter';
    cols.forEach((col,i)=>{
      const a = t*speed*0.25 + i*1.7;
      const cx = w*(0.5 + 0.34*Math.cos(a + i));
      const cy = h*(0.5 + 0.34*Math.sin(a*0.8 + i*2.1));
      const r = R*(0.26 + 0.1*Math.sin(a*1.3 + i));
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0, withAlpha(col, 0.62*inten));
      g.addColorStop(1, withAlpha(col, 0));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
    });
    ctx.restore();
  },
  cosmic(ctx, w, h, p, t){
    const density = (p.density ?? 55)/100, hue = p.hue ?? 258, drift = (p.drift ?? 25)/100;
    const g = ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0, hueShift('#070512', hue-258));
    g.addColorStop(1, hueShift('#191040', hue-258));
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
    // nebula washes
    ctx.save(); ctx.globalCompositeOperation = 'screen';
    [[.28,.3,'#645DD7'],[.72,.62,'#FF6FAE'],[.5,.85,'#2DC7FF']].forEach(([fx,fy,col],i)=>{
      const r = Math.max(w,h)*0.42;
      const ng = ctx.createRadialGradient(w*fx,h*fy,0,w*fx,h*fy,r);
      ng.addColorStop(0, withAlpha(hueShift(col, hue-258), .17));
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ng; ctx.fillRect(0,0,w,h);
    });
    ctx.restore();
    // stars
    const rnd = mulberry32(42), n = Math.round(90 + density*360);
    const off = (t*drift*8);
    for (let i=0;i<n;i++){
      const sx = (rnd()*w + off*(0.3+rnd()*0.7)) % w;
      const sy = rnd()*h;
      const tw = 0.55 + 0.45*Math.sin(t*(0.5+rnd()*1.5) + i);
      const sz = rnd()*1.6 + 0.4;
      ctx.fillStyle = `rgba(235,238,255,${(0.25+rnd()*0.7)*tw})`;
      ctx.fillRect(sx, sy, sz, sz);
    }
  },
  glass(ctx, w, h, p, t){
    const blur = (p.blur ?? 58)/100, tint = (p.tint ?? 30)/100, edge = (p.edge ?? 55)/100;
    // colour field behind the pane
    const field = (c) => {
      c.fillStyle = '#141322'; c.fillRect(0,0,w,h);
      c.save(); c.globalCompositeOperation = 'lighter';
      [['#F42C04',.22,.3],['#FCCA46',.78,.24],['#645DD7',.3,.8],['#2DC7FF',.78,.76]].forEach(([col,fx,fy],i)=>{
        const a = t*0.05 + i;
        const cx = w*fx + Math.cos(a)*w*0.04, cy = h*fy + Math.sin(a)*h*0.04;
        const r = Math.max(w,h)*0.38;
        const g = c.createRadialGradient(cx,cy,0,cx,cy,r);
        g.addColorStop(0, withAlpha(col,.75)); g.addColorStop(1, withAlpha(col,0));
        c.fillStyle = g; c.beginPath(); c.arc(cx,cy,r,0,7); c.fill();
      });
      c.restore();
    };
    field(ctx);
    // frosted pane
    const m = Math.min(w,h)*0.07, rx = m, ry = m, rw = w-m*2, rh = h-m*2, rad = Math.min(w,h)*0.045;
    const off = el('canvas'); off.width = Math.max(2, Math.round(w/4)); off.height = Math.max(2, Math.round(h/4));
    const oc = off.getContext('2d'); oc.scale(off.width/w, off.height/h); field(oc);
    ctx.save();
    ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,rad); ctx.clip();
    ctx.filter = `blur(${Math.round(Math.min(w,h)*0.05*(.3+blur))}px)`;
    ctx.drawImage(off, -w*0.02, -h*0.02, w*1.04, h*1.04);
    ctx.filter = 'none';
    ctx.fillStyle = `rgba(255,255,255,${0.05 + tint*0.22})`;
    ctx.fillRect(rx,ry,rw,rh);
    ctx.restore();
    // specular edge + chromatic fringe
    ctx.save();
    ctx.lineWidth = Math.max(1.2, Math.min(w,h)*0.0028);
    const eg = ctx.createLinearGradient(rx,ry,rx+rw,ry+rh);
    eg.addColorStop(0, `rgba(255,255,255,${.75*edge})`);
    eg.addColorStop(.4, `rgba(255,255,255,${.12*edge})`);
    eg.addColorStop(1, `rgba(255,255,255,${.4*edge})`);
    ctx.strokeStyle = eg;
    ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,rad); ctx.stroke();
    ctx.globalAlpha = .3*edge;
    ctx.strokeStyle = 'rgba(255,80,80,.8)';
    ctx.beginPath(); ctx.roundRect(rx-1.2,ry-1.2,rw+2.4,rh+2.4,rad); ctx.stroke();
    ctx.strokeStyle = 'rgba(80,160,255,.8)';
    ctx.beginPath(); ctx.roundRect(rx+1.2,ry+1.2,rw-2.4,rh-2.4,rad); ctx.stroke();
    ctx.restore();
  },
  spotlight(ctx, w, h, p, t){
    const size = (p.size ?? 62)/100, warmth = (p.warmth ?? 35)/100, floor = (p.floor ?? 14)/100;
    const sx = (p.x ?? 0.5)*w, sy = (p.y ?? 0.3)*h;
    ctx.fillStyle = '#0A0A0D'; ctx.fillRect(0,0,w,h);
    const warm = mixHex('#FFFFFF', '#FCCA46', warmth);
    const r = Math.max(w,h)*(0.35+size*0.75);
    const g = ctx.createRadialGradient(sx,sy,0,sx,sy,r);
    g.addColorStop(0, withAlpha(warm,.85));
    g.addColorStop(.35, withAlpha(warm,.28));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
    if (floor > 0.01){
      const fg = ctx.createLinearGradient(0,h*.62,0,h);
      fg.addColorStop(0,'rgba(0,0,0,0)');
      fg.addColorStop(1, withAlpha(warm, floor*.9));
      ctx.fillStyle = fg; ctx.fillRect(0,h*.62,w,h*.38);
    }
  },
  grid(ctx, w, h, p, t){
    const glow = (p.glow ?? 60)/100, hue = p.hue ?? 205, lines = Math.round(p.lines ?? 16);
    const col = hueShift('#2DC7FF', hue-197);
    ctx.fillStyle = '#08080D'; ctx.fillRect(0,0,w,h);
    const horizon = h*0.46;
    // bloom
    const g = ctx.createRadialGradient(w/2,horizon,0,w/2,horizon,Math.max(w,h)*.6);
    g.addColorStop(0, withAlpha(col, .5*glow));
    g.addColorStop(.4, withAlpha(col, .12*glow));
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle = withAlpha(col, .55);
    ctx.lineWidth = Math.max(1, Math.min(w,h)/900);
    // verticals converging on vanishing point
    for (let i=-lines;i<=lines;i++){
      ctx.beginPath();
      ctx.moveTo(w/2 + (i/lines)*w*1.6, h);
      ctx.lineTo(w/2 + (i/lines)*w*0.05, horizon);
      ctx.stroke();
    }
    // horizontals racing toward viewer
    const phase = (t*0.05) % 1;
    for (let i=0;i<14;i++){
      const f = ((i + phase)/14);
      const y = horizon + Math.pow(f, 2.4)*(h-horizon);
      ctx.globalAlpha = 0.15 + f*0.85;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // horizon line
    ctx.strokeStyle = withAlpha(col,.9); ctx.lineWidth *= 1.6;
    ctx.beginPath(); ctx.moveTo(0,horizon); ctx.lineTo(w,horizon); ctx.stroke();
  },
};
function atmoParams(frame){
  // merge stored params over defaults
  const def = ATMO_DEFS[frame.atmo.effect];
  const out = {};
  Object.entries(def.params).forEach(([k, [,,,,dflt]]) => out[k] = frame.atmo.params[k] ?? dflt);
  ['x','y'].forEach(k => { if (frame.atmo.params[k] != null) out[k] = frame.atmo.params[k]; });
  return out;
}
function paintAtmo(canvas, frame, t, scaleFactor = 1){
  const w = frame.width, h = frame.height;
  // preview quality cap for perf; export passes higher scaleFactor
  const bw = Math.round(w*scaleFactor), bh = Math.round(h*scaleFactor);
  if (canvas.width !== bw || canvas.height !== bh){ canvas.width = bw; canvas.height = bh; }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(scaleFactor,0,0,scaleFactor,0,0);
  ATMO_PAINTERS[frame.atmo.effect](ctx, w, h, atmoParams(frame), t);
}

<script>
/* ================================================================== */

/* ---- screenshot content inside a screen slot ---- */
function screenContent(m, opts, fontBase){
  const box = el('div','screen-box',{position:'absolute', inset:'0', overflow:'hidden'});
  const info = imgOf(m);
  if (info){
    const s = m.screenshot;
    const img = el('img');
    img.src = info.src;
    img.draggable = false;
    Object.assign(img.style, {
      width:'100%', height:'100%', display:'block',
      objectFit: s.fit === 'fill' ? 'fill' : s.fit,
      transform:`translate(${s.x}%, ${s.y}%) scale(${s.scale/100})`,
      transformOrigin:'center center',
    });
    box.style.background = '#0b0b0e';
    box.appendChild(img);
    if (opts.interactive) box.classList.add('screen-pan');
  } else {
    const fs = Math.round(fontBase);
    Object.assign(box.style, {
      background: m.device.theme === 'light' ? '#ECECEF' : '#131318',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      gap: fs*0.5+'px', color: m.device.theme === 'light' ? '#8a8a92' : '#6a6a74',
      cursor: opts.interactive ? 'pointer' : 'default',
    });
    const plus = el('div', null, {
      width:fs*2+'px', height:fs*2+'px', borderRadius:'50%',
      border:`${Math.max(2,fs*0.09)}px solid currentColor`, display:'flex',
      alignItems:'center', justifyContent:'center', fontSize:fs*1.2+'px', lineHeight:'1', fontWeight:'300',
    });
    plus.textContent = '+';
    const t1 = el('div', null, {fontSize:fs+'px', fontWeight:'700', letterSpacing:'-0.01em'});
    t1.textContent = 'Paste a screenshot to start';
    const t2 = el('div', null, {fontSize:fs*0.62+'px', fontWeight:'500', opacity:.7});
    t2.textContent = '⌘V anywhere · drop an image · or click here';
    box.append(plus, t1, t2);
    if (opts.interactive){ box.classList.add('screen-empty'); box.setAttribute('title','Choose an image'); }
  }
  return box;
}
function screenshotAspect(m, fallback){
  const info = imgOf(m);
  return info ? info.w / info.h : fallback;
}

/* ---- shared chrome bits ---- */
function trafficLights(size){
  const wrap = el('div', null, {display:'flex', gap:size*0.62+'px', alignItems:'center', flex:'none'});

  });

}
function statusBarSVG(color, h){

/* ---- device catalogue ----
   Each builder returns { root, devW, devH }. The screenshot slot is built
   via screenContent(). New devices: add one entry, no renderer changes.  */
const DEVICES = {};

DEVICES.bare = {
  category:'bare', label:'None — bare shot',

function browserBuilder(style){

const PHONE_FINISHES = {

}
DEVICES['iphone-17'] = phoneBuilder(false);

DEVICES['macbook-pro-14'] = {

const DEVICE_CATEGORIES = [
  ['bare','None', ['bare']],

];

/* ---- background accent (for shadow sampling / glow) ---- */
function bgAccent(f){
  const bg = f.background;
  if (bg.type === 'solid') return f.solid.color;
  if (bg.type === 'gradient'){
    if (bg.mode === 'mesh' && bg.meshPoints?.length)
      return bg.meshPoints.reduce((a,p)=>mixHex(a,p.color,.5), bg.meshPoints[0].color);
    return bg.stops.reduce((a,s)=>mixHex(a,s.color,.5), bg.stops[0].color);
  }
  if (bg.type === 'atmosphere'){
    const e = f.atmo.effect;
    if (e === 'spotlight') return '#FCCA46';
    if (e === 'grid') return hueShift('#2DC7FF', (f.atmo.params.hue ?? 205)-197);
    return '#645DD7';
  }
  if (bg.type === 'texture') return f.texture.base;
  if (bg.type === 'image') return f.image.tint || '#404048';
  return '#26262E';
}

/* ---- background layer stack ---- */
function buildBackgroundLayers(f, opts){
  const wrap = el('div', null, {position:'absolute', inset:'0'});
  const bg = f.background;
  if (bg.type === 'solid'){
    wrap.style.background = f.solid.color;
  }
  else if (bg.type === 'gradient'){
    wrap.style.backgroundImage = gradientCSS(bg);
  }
  else if (bg.type === 'atmosphere'){
    const canvas = el('canvas', null, {position:'absolute', inset:'0', width:'100%', height:'100%'});
    const scale = opts.atmoScale ?? Math.min(1, 1280/Math.max(f.width,f.height));
    paintAtmo(canvas, f, opts.atmoTime ?? performance.now()/1000, scale);
    if (opts.registerAtmo) opts.registerAtmo(canvas, scale);
    wrap.appendChild(canvas);
  }
  else if (bg.type === 'texture'){
    const t = f.texture;
    wrap.style.background = t.base;
    const tex = el('div', null, {
      position:'absolute', inset:'0',
      backgroundImage:`url(${textureURL(t.textureId)})`,
      backgroundSize: `${Math.max(280, Math.round(f.width/4))}px auto`,
      mixBlendMode: t.blendMode || 'normal',
      opacity: (t.opacity ?? 100)/100,
    });
    wrap.appendChild(tex);
    if (t.tint){
      wrap.appendChild(el('div', null, {
        position:'absolute', inset:'0', background:t.tint, mixBlendMode:'color', opacity:.85,
      }));
    }
  }
  else if (bg.type === 'image'){
    const im = f.image;
    wrap.style.background = '#101014';
    if (im.src && IMAGES[im.src]){
      const img = el('img');
      img.src = IMAGES[im.src].src;
      Object.assign(img.style, {
        position:'absolute', inset:'0', width:'100%', height:'100%',
        objectFit: im.fit === 'tile' ? 'none' : im.fit,
        transform:`translate(${im.x}%, ${im.y}%) scale(${im.scale/100})`,
        filter:`blur(${im.blur}px) brightness(${im.brightness}%)`,
      });
      if (im.fit === 'tile'){
        img.remove();
        wrap.appendChild(el('div', null, {
          position:'absolute', inset:'0',
          backgroundImage:`url(${IMAGES[im.src].src})`,
          backgroundSize:`${Math.round(f.width*im.scale/300)}px auto`,
          filter:`blur(${im.blur}px) brightness(${im.brightness}%)`,
        }));
      } else wrap.appendChild(img);
      if (im.tint && im.tintOpacity > 0){
        wrap.appendChild(el('div', null, {
          position:'absolute', inset:'0', background:im.tint, opacity:im.tintOpacity/100,
        }));
      }
    }
  }
  return wrap;
}

/* ---- one mockup: shadow wrap → transform → device (+reflection) ---- */
function buildMockup(compRef, m, idx, opts){
  const f = compRef.frame;
  const dev = DEVICES[m.device.modelId] || DEVICES.bare;
  const layout = layoutOverride(compRef, idx);
  const t = layout || m.transform;
  const sh = layout?.shadow ? {...m.shadow, ...SHADOW_PRESETS[layout.shadow], presetId:layout.shadow} : m.shadow;

  const { root: deviceEl, devW, devH } = dev.build(m, opts);
  const pad = f.padding/100 * Math.min(f.width, f.height);
  const availW = Math.max(50, f.width - pad*2), availH = Math.max(50, f.height - pad*2);
  const baseFit = Math.min(availW/devW, availH/devH) * 0.78;
  const s = baseFit * (t.scale/100);

  // shadow/glow live on an untransformed wrapper so offsets stay in frame space
  const shadowWrap = el('div', null, {position:'absolute', inset:'0', pointerEvents:'none'});
  const filters = [];
  if (sh.opacity > 0 && (sh.blur > 0 || sh.x || sh.y)){
    filters.push(`drop-shadow(${sh.x}px ${sh.y}px ${sh.blur}px ${withAlpha(sh.color, sh.opacity)})`);
    if (sh.blur > 30) filters.push(`drop-shadow(${sh.x*0.3}px ${Math.max(2,sh.y*0.25)}px ${sh.blur*0.3}px ${withAlpha(sh.color, sh.opacity*0.55)})`);
  }
  if (m.glow?.enabled){
    filters.push(`drop-shadow(0 0 ${Math.round(f.width*0.045*(m.glow.strength/100)+8)}px ${withAlpha(mixHex(bgAccent(f), '#ffffff', .25), .8*(m.glow.strength/100)+.1)})`);
  }
  if (filters.length) shadowWrap.style.filter = filters.join(' ');

  const holder = el('div', 'mockup-hit', {
    position:'absolute', left:'50%', top:'50%', width:devW+'px', height:devH+'px',
    marginLeft:(-devW/2)+'px', marginTop:(-devH/2)+'px',
    transform:
      `translate(${(t.x*f.width).toFixed(1)}px, ${(t.y*f.height).toFixed(1)}px) `+
      `rotate(${t.rotate}deg) perspective(${t.perspective}px) `+
      `rotateX(${t.rotateX}deg) rotateY(${t.rotateY}deg) scale(${s.toFixed(4)})`,
    transformOrigin:'center center',
    pointerEvents: opts.interactive ? 'auto' : 'none',
  });
  if (opts.interactive){
    holder.dataset.mockupIdx = idx;
    if (ui.travel && !REDUCED) holder.style.transition = 'transform .55s cubic-bezier(.3,1.3,.42,1)';
  }
  holder.appendChild(deviceEl);

  if (m.reflection?.enabled){
    const { root: reflEl } = dev.build(m, {...opts, interactive:false});
    const fall = clamp(m.reflection.falloff, 5, 95);
    const refl = el('div', null, {
      position:'absolute', left:'0', top:'100%', width:devW+'px', height:devH+'px',
      transform:'scaleY(-1)', marginTop:'6px',
      opacity: m.reflection.opacity/100,
      maskImage:`linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0) ${fall}%)`,
      webkitMaskImage:`linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0) ${fall}%)`,
      pointerEvents:'none',
    });
    refl.style.webkitMaskImage = `linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0) ${fall}%)`;
    refl.appendChild(reflEl);
    holder.appendChild(refl);
  }
  shadowWrap.appendChild(holder);
  holder.style.pointerEvents = opts.interactive ? 'auto' : 'none';
  return shadowWrap;
}

/* ---- full composition (pure function of comp) ---- */
function buildComposition(compRef, opts = {}){
  const f = compRef.frame;
  const root = el('div', null, {
    position:'relative', width:f.width+'px', height:f.height+'px', overflow:'hidden',
    borderRadius:f.cornerRadius+'px',
    background:'transparent',
    fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",
  });
  if (!f.transparent) root.appendChild(buildBackgroundLayers(f, opts));

  const mockLayer = el('div', null, {position:'absolute', inset:'0'});
  compRef.mockups.forEach((m,i)=> mockLayer.appendChild(buildMockup(compRef, m, i, opts)));
  root.appendChild(mockLayer);

  if (!f.transparent){
    if (f.dither && (f.background.type === 'gradient' || f.background.type === 'atmosphere')){
      root.appendChild(el('div', null, {
        position:'absolute', inset:'0', backgroundImage:`url(${ditherURL()})`, backgroundSize:'128px',
        opacity:.5, mixBlendMode:'overlay', pointerEvents:'none',
      }));
    }
    if (f.grain > 0){
      root.appendChild(el('div', null, {
        position:'absolute', inset:'0', backgroundImage:`url(${grainURL()})`, backgroundSize:'192px',
        opacity:(f.grain/100)*0.55, mixBlendMode:'overlay', pointerEvents:'none',
      }));
    }
    if (f.vignette.amount > 0){
      const r = 55 + f.vignette.radius*0.6;
      root.appendChild(el('div', null, {
        position:'absolute', inset:'0', pointerEvents:'none',
        background:`radial-gradient(ellipse ${r}% ${r}% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,${(f.vignette.amount/100)*0.75}) 100%)`,
      }));
    }
  }
  if (f.border && f.border.width > 0){
    root.appendChild(el('div', null, {
      position:'absolute', inset:'0', borderRadius:'inherit', pointerEvents:'none',
      boxShadow:`inset 0 0 0 ${f.border.width}px ${f.border.color}`,
    }));
  }
  return root;
}

/* ---- main canvas rendering + ambient clock ---- */
let liveAtmo = [];          // [{canvas, scale}] canvases in the live view
let lastFrameDims = null;
function viewScale(){
  const wrapEl = $('canvasWrap');
  const f = comp.frame;
  if (ui.zoom === 'fit'){
    const k = Math.min((wrapEl.clientWidth-70)/f.width, (wrapEl.clientHeight-70)/f.height);
    return Math.min(k, 1.4);
  }
  return ui.zoom;
}
function renderMain(opts = {}){
  const f = comp.frame;
  const scaler = $('compScaler'), host = $('compHost');
  const k = viewScale();
  const dimKey = f.width+'x'+f.height;
  if (lastFrameDims && lastFrameDims !== dimKey && !REDUCED){
    scaler.classList.add('reshape');
    clearTimeout(scaler._rs); scaler._rs = setTimeout(()=>scaler.classList.remove('reshape'), 550);
  }
  lastFrameDims = dimKey;
  scaler.style.width = (f.width*k)+'px';
  scaler.style.height = (f.height*k)+'px';
  scaler.style.transform = `translate(${ui.panX}px, ${ui.panY}px)`;
  scaler.classList.toggle('transparent-bg', f.transparent);
  host.style.width = f.width+'px';
  host.style.height = f.height+'px';
  host.style.transform = `scale(${k})`;

  liveAtmo = [];
  host.textContent = '';
  host.appendChild(buildComposition(comp, {
    interactive:true,
    atmoTime: performance.now()/1000,
    registerAtmo: (canvas, scale)=> liveAtmo.push({canvas, scale}),
  }));
  attachCanvasInteractions(host);
  renderBgHandles(scaler, k);
  $('zoomLabel').textContent = Math.round(k*100)+'%';
  ui.travel = false;
}
/* ambient drift ~30fps, only when an atmosphere is live */
let _lastTick = 0;
function tick(now){
  requestAnimationFrame(tick);
  if (REDUCED || ui.exporting || document.hidden) return;
  if (comp.frame.background.type !== 'atmosphere' || !liveAtmo.length) return;
  if (now - _lastTick < 33) return;
  _lastTick = now;
  liveAtmo.forEach(({canvas, scale}) => paintAtmo(canvas, comp.frame, now/1000, scale));
}
requestAnimationFrame(tick);
window.addEventListener('resize', ()=>{ if (ui.zoom==='fit') renderMain(); });
</script>

<script>
/* ================================================================== */
/* PART D — UI panels                                                  */
/* ================================================================== */
function mkSection(parent, title){
  const sec = el('section');
  const h = el('h2'); h.textContent = title;
  sec.appendChild(h);
  parent.appendChild(sec);
  return sec;
}
function mkRow(parent, labelText){
  const row = el('div','row');
  if (labelText != null){
    const l = el('label'); l.textContent = labelText; row.appendChild(l);
  }
  parent.appendChild(row);
  return row;
}
function sliderRow(parent, label, min, max, step, get, set, opts = {}){
  const row = mkRow(parent, label);
  const r = el('input'); r.type = 'range'; r.min = min; r.max = max; r.step = step; r.value = get();
  const n = el('input'); n.type = 'number'; n.min = min; n.max = max; n.step = step; n.value = get();
  n.style.width = '56px';
  const apply = v => {
    v = clamp(+v, min, max);
    if (Number.isNaN(v)) return;
    r.value = v; n.value = v;
    window.syncNimbleRangeFill?.(r);
    set(v);
  };
  r.addEventListener('input', ()=>apply(r.value));
  n.addEventListener('change', ()=>apply(n.value));
  if (opts.def != null) r.addEventListener('dblclick', ()=>apply(opts.def));
  row.append(r, n);
  window.syncNimbleRangeFill?.(r);
  return row;
}
function segRow(parent, options, get, set, mini){
  const seg = el('div', 'seg'+(mini?' mini':''));
  options.forEach(([id, label])=>{
    const b = el('button'); b.type = 'button'; b.textContent = label;
    b.classList.toggle('on', get() === id);
    b.addEventListener('click', ()=>{
      set(id);
      [...seg.children].forEach((c,i)=>c.classList.toggle('on', options[i][0] === id));
    });
    seg.appendChild(b);
  });
  parent.appendChild(seg);
  return seg;
}
function checkRow(parent, label, get, set){
  const row = mkRow(parent, label);
  const c = el('input'); c.type = 'checkbox'; c.checked = !!get();
  c.style.marginLeft = 'auto';
  c.addEventListener('change', ()=>set(c.checked));
  row.appendChild(c);
  return row;
}
function textRow(parent, label, get, set, placeholder){
  const row = mkRow(parent, label);
  const t = el('input'); t.type = 'text'; t.value = get() ?? ''; t.placeholder = placeholder || '';
  t.addEventListener('input', ()=>set(t.value));
  row.appendChild(t);
  return row;
}
function selectRow(parent, label, options, get, set){
  const row = mkRow(parent, label);
  const s = el('select');
  options.forEach(([v, txt])=>{
    const o = el('option'); o.value = v; o.textContent = txt; s.appendChild(o);
  });
  s.value = get();
  s.addEventListener('change', ()=>set(s.value));
  row.appendChild(s);
  return row;
}
function colorRow(parent, label, get, set){
  const row = mkRow(parent, label);
  const c = el('input'); c.type = 'color'; c.value = get();
  const hexIn = el('input'); hexIn.type = 'text'; hexIn.value = get(); hexIn.style.width = '80px'; hexIn.style.flex = 'none';
  hexIn.spellcheck = false;
  c.addEventListener('input', ()=>{ hexIn.value = c.value; set(c.value); });
  c.addEventListener('change', ()=>pushRecent(c.value));
  hexIn.addEventListener('change', ()=>{
    let v = hexIn.value.trim(); if (!v.startsWith('#')) v = '#'+v;
    if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(v)){ c.value = v.length===4 ? '#'+[...v.slice(1)].map(x=>x+x).join('') : v; set(c.value); pushRecent(c.value); }
    else hexIn.value = get();
  });
  row.append(c, hexIn);
  return row;
}
function pushRecent(color){
  color = color.toUpperCase();
  ui.recentColors = [color, ...ui.recentColors.filter(c=>c!==color)].slice(0,8);
}

/* ---------------- FRAME panel ---------------- */
function buildFramePanel(body){
  const f = comp.frame;

  /* dimensions */
  const dim = mkSection(body, 'Dimensions');
  const sel = el('select');
  DIM_GROUPS.forEach(([group, list])=>{
    const og = el('optgroup'); og.label = group;
    list.forEach(([id, name, w, h])=>{
      const o = el('option'); o.value = id; o.textContent = `${name} · ${w}×${h}`;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
  const oCustom = el('option'); oCustom.value = '__custom'; oCustom.textContent = 'Custom';
  sel.appendChild(oCustom);
  sel.value = f.presetId && DIM_BY_ID[f.presetId] ? f.presetId : '__custom';
  sel.addEventListener('change', ()=>{
    if (sel.value === '__custom') return;
    const [,,w,h] = DIM_BY_ID[sel.value];
    mutate(c=>{ c.frame.width = w; c.frame.height = h; c.frame.presetId = sel.value; }, {});
    reSolveLayout();
    wIn.value = w; hIn.value = h;
  });
  mkRow(dim).appendChild(sel);
  const sizeRow = mkRow(dim);
  const wIn = el('input'); wIn.type = 'number'; wIn.min = 64; wIn.max = 4096; wIn.value = f.width; wIn.style.width = '76px';
  const hIn = el('input'); hIn.type = 'number'; hIn.min = 64; hIn.max = 4096; hIn.value = f.height; hIn.style.width = '76px';
  const x = el('span', null, {color:'var(--muted)'}); x.textContent = '×';
  const swap = el('button','small'); swap.textContent = '⇄'; swap.title = 'Swap orientation';
  const lockB = el('button','small'); lockB.title = 'Lock aspect ratio';
  let locked = false;
  const syncLock = ()=>{ lockB.textContent = locked ? '🔒' : '🔓'; lockB.style.color = locked ? 'var(--ink)' : 'var(--faint)'; };
  syncLock();
  lockB.addEventListener('click', ()=>{ locked = !locked; syncLock(); });
  const applySize = (fromW)=>{
    let w = clamp(Math.round(+wIn.value)||1080, 64, 4096);
    let h = clamp(Math.round(+hIn.value)||1080, 64, 4096);
    if (locked){
      const ratio = comp.frame.width / comp.frame.height;
      if (fromW) h = clamp(Math.round(w/ratio), 64, 4096);
      else w = clamp(Math.round(h*ratio), 64, 4096);
    }
    wIn.value = w; hIn.value = h;
    const match = Object.values(DIM_BY_ID).find(([,,pw,ph])=>pw===w&&ph===h);
    sel.value = match ? match[0] : '__custom';
    mutate(c=>{ c.frame.width = w; c.frame.height = h; c.frame.presetId = match ? match[0] : null; });
    reSolveLayout();
  };
  wIn.addEventListener('change', ()=>applySize(true));
  hIn.addEventListener('change', ()=>applySize(false));
  swap.addEventListener('click', ()=>{
    const w = comp.frame.height, h = comp.frame.width;
    wIn.value = w; hIn.value = h; locked = false; syncLock();
    const match = Object.values(DIM_BY_ID).find(([,,pw,ph])=>pw===w&&ph===h);
    sel.value = match ? match[0] : '__custom';
    mutate(c=>{ c.frame.width = w; c.frame.height = h; c.frame.presetId = match ? match[0] : null; });
    reSolveLayout();
  });
  sizeRow.append(wIn, x, hIn, swap, lockB);

  /* background */
  const bgSec = mkSection(body, 'Background');
  segRow(bgSec, [['solid','Solid'],['gradient','Grad'],['atmosphere','Atmos'],['texture','Texture'],['image','Image']],
    ()=>f.background.type,
    v=>mutate(c=>{ c.frame.background.type = v; c.frame.transparent = false; }, {rebuildPanels:true}), true);
  const bgBody = el('div', null, {marginTop:'10px'});
  bgSec.appendChild(bgBody);
  const type = f.background.type;

  if (type === 'solid'){
    const grid = el('div','swatches');
    [...BRAND, '#FFFFFF', '#0B0B0F', ...NEUTRALS].forEach(colr=>{
      const b = el('button','sw'); b.style.background = colr; b.title = colr;
      b.classList.toggle('on', f.solid.color.toUpperCase() === colr.toUpperCase());
      b.addEventListener('click', ()=>{ mutate(c=>c.frame.solid.color = colr, {rebuildPanels:true}); pushRecent(colr); });
      grid.appendChild(b);
    });
    bgBody.appendChild(grid);
    colorRow(bgBody, 'Colour', ()=>f.solid.color, v=>mutate(c=>c.frame.solid.color = v));
    if (window.EyeDropper){
      const r = mkRow(bgBody);
      const eye = el('button','small'); eye.textContent = '💧 Eyedropper'; eye.style.flex = '1';
      eye.addEventListener('click', async ()=>{
        try{ const res = await new EyeDropper().open(); mutate(c=>c.frame.solid.color = res.sRGBHex, {rebuildPanels:true}); pushRecent(res.sRGBHex); }catch(e){}
      });
      r.appendChild(eye);
    }
    if (ui.recentColors.length){
      const rec = mkSection(bgBody, 'Recent');
      const g = el('div','swatches');
      ui.recentColors.forEach(colr=>{
        const b = el('button','sw'); b.style.background = colr; b.title = colr;
        b.addEventListener('click', ()=>mutate(c=>c.frame.solid.color = colr, {rebuildPanels:true}));
        g.appendChild(b);
      });
      rec.appendChild(g);
    }
  }
  else if (type === 'gradient'){
    const bg = f.background;
    segRow(bgBody, [['linear','Linear'],['radial','Radial'],['conic','Conic'],['mesh','Mesh']],
      ()=>bg.mode, v=>mutate(c=>c.frame.background.mode = v, {rebuildPanels:true}), true);
    const presetGrid = el('div','swatches', {marginTop:'10px'});
    GRAD_PRESETS.forEach(cols=>{
      const b = el('button','sw');
      b.style.background = `linear-gradient(135deg, ${cols.join(',')})`;
      b.title = cols.join(' → ');
      b.addEventListener('click', ()=>{
        mutate(c=>{
          const g = c.frame.background;
          g.stops = cols.map((col,i)=>({color:col, position:Math.round(i*100/(cols.length-1))}));
          if (g.mode === 'mesh'){
            const pts = [[.2,.22],[.82,.24],[.24,.8],[.8,.78],[.5,.5],[.65,.4]];
            g.meshPoints = cols.concat(cols.length<4?cols:[]).slice(0, Math.max(4, cols.length))
              .map((col,i)=>({x:pts[i%6][0], y:pts[i%6][1], color:col}));
          }
        }, {rebuildPanels:true});
      });
      presetGrid.appendChild(b);
    });
    bgBody.appendChild(presetGrid);

    if (bg.mode === 'mesh'){
      const pts = bg.meshPoints;
      const chipWrap = el('div', null, {display:'flex', gap:'6px', flexWrap:'wrap', margin:'8px 0'});
      pts.forEach((p,i)=>{
        const b = el('button', null, {
          width:'26px', height:'26px', borderRadius:'50%', padding:'0',
          background:p.color, border: ui.selMesh===i ? '2px solid var(--focus)' : '2px solid rgba(255,255,255,.2)',
        });
        b.title = `Point ${i+1}`;
        b.addEventListener('click', ()=>{ ui.selMesh = i; buildPanels(); renderMain(); });
        chipWrap.appendChild(b);
      });
      bgBody.appendChild(chipWrap);
      if (ui.selMesh >= 0 && pts[ui.selMesh]){
        colorRow(bgBody, 'Colour', ()=>pts[ui.selMesh].color,
          v=>mutate(c=>c.frame.background.meshPoints[ui.selMesh].color = v));
      }
      const r = mkRow(bgBody);
      const add = el('button','small'); add.textContent = '+ Point'; add.style.flex='1';
      add.addEventListener('click', ()=>{
        if (pts.length >= 6) return toast('Mesh holds 4–6 points');
        mutate(c=>c.frame.background.meshPoints.push({
          x:.3+Math.random()*.4, y:.3+Math.random()*.4,
          color:BRAND[Math.floor(Math.random()*BRAND.length)],
        }), {rebuildPanels:true});
      });
      const rm = el('button','small'); rm.textContent = '− Point'; rm.style.flex='1';
      rm.addEventListener('click', ()=>{
        if (pts.length <= 4) return toast('Mesh needs at least 4 points');
        mutate(c=>c.frame.background.meshPoints.splice(ui.selMesh>=0?ui.selMesh:pts.length-1, 1), {rebuildPanels:true});
        ui.selMesh = -1;
      });
      r.append(add, rm);
      const n = el('div','note'); n.textContent = 'Drag the points directly on the canvas.';
      bgBody.appendChild(n);
    } else {
      /* stops editor */
      const bar = el('div','stopsbar');
      const paintBar = ()=>{ bar.style.background = `linear-gradient(90deg, ${stopsCSS(bg.stops)})`; };
      paintBar();
      bg.stops.forEach((s,i)=>{
        const dot = el('button','stop'+(ui.selStop===i?' sel':''));
        dot.style.left = s.position+'%';
        dot.style.background = s.color;
        dot.addEventListener('pointerdown', ev=>{
          ev.preventDefault(); ev.stopPropagation();
          ui.selStop = i;
          [...bar.querySelectorAll('.stop')].forEach((d,k)=>d.classList.toggle('sel', k===i));
          const rect = bar.getBoundingClientRect();
          const move = e=>{
            const pos = clamp(Math.round((e.clientX-rect.left)/rect.width*100), 0, 100);
            comp.frame.background.stops[i].position = pos;
            dot.style.left = pos+'%';
            paintBar(); renderMain(); scheduleCommit(); scheduleSave();
          };
          const up = ()=>{ removeEventListener('pointermove',move); removeEventListener('pointerup',up); buildPanels(); afterChange(); };
          addEventListener('pointermove',move); addEventListener('pointerup',up);
        });
        bar.appendChild(dot);
      });
      bar.addEventListener('click', ev=>{
        if (ev.target !== bar) return;
        const rect = bar.getBoundingClientRect();
        const pos = clamp(Math.round((ev.clientX-rect.left)/rect.width*100), 0, 100);
        const sorted = bg.stops.slice().sort((a,b)=>a.position-b.position);
        let colr = sorted[0].color;
        for (let i=0;i<sorted.length-1;i++){
          if (pos >= sorted[i].position && pos <= sorted[i+1].position){
            const t = (pos-sorted[i].position)/Math.max(1,(sorted[i+1].position-sorted[i].position));
            colr = mixHex(sorted[i].color, sorted[i+1].color, t);
            break;
          }
        }
        mutate(c=>{ c.frame.background.stops.push({color:colr, position:pos}); }, {rebuildPanels:true});
        ui.selStop = bg.stops.length-1;
      });
      bgBody.appendChild(bar);
      if (bg.stops[ui.selStop] == null) ui.selStop = 0;
      const s = bg.stops[ui.selStop];
      colorRow(bgBody, `Stop ${ui.selStop+1}`, ()=>s.color, v=>mutate(c=>{ c.frame.background.stops[ui.selStop].color = v; }));
      const delRow = mkRow(bgBody);
      const del = el('button','small'); del.textContent = 'Remove stop'; del.style.flex = '1';
      del.addEventListener('click', ()=>{
        if (bg.stops.length <= 2) return toast('Keep at least 2 stops');
        mutate(c=>c.frame.background.stops.splice(ui.selStop,1), {rebuildPanels:true});
        ui.selStop = 0;
      });
      delRow.appendChild(del);
      if (bg.mode === 'linear' || bg.mode === 'conic')
        sliderRow(bgBody, 'Angle', 0, 360, 1, ()=>bg.angle, v=>mutate(c=>c.frame.background.angle = v), {def:135});
      if (bg.mode === 'radial' || bg.mode === 'conic'){
        sliderRow(bgBody, 'Centre X', 0, 100, 1, ()=>bg.x ?? 50, v=>mutate(c=>c.frame.background.x = v), {def:50});
        sliderRow(bgBody, 'Centre Y', 0, 100, 1, ()=>bg.y ?? 50, v=>mutate(c=>c.frame.background.y = v), {def:50});
      }
      const n = el('div','note');
      n.textContent = OKLAB_OK ? 'Blending in OKLab — brand colours stay clean through the middle.' : '';
      bgBody.appendChild(n);
    }
  }
  else if (type === 'atmosphere'){
    const chips = el('div','chips', {gridTemplateColumns:'repeat(3,1fr)'});
    Object.entries(ATMO_DEFS).forEach(([eid, def])=>{
      const c = el('button','chip'+(f.atmo.effect===eid?' on':''));
      const th = el('div','cthumb');
      const mini = el('canvas'); mini.width = 96; mini.height = 60;
      const mctx = mini.getContext('2d');
      mctx.scale(96/f.width, 60/f.height);
      try{ ATMO_PAINTERS[eid](mctx, f.width, f.height, Object.fromEntries(Object.entries(def.params).map(([k,v])=>[k,v[4]])), 4); }catch(e){}
      th.style.backgroundImage = `url(${mini.toDataURL()})`;
      const lb = el('span'); lb.textContent = def.label;
      c.append(th, lb);
      c.addEventListener('click', ()=>mutate(cc=>{ cc.frame.atmo.effect = eid; cc.frame.atmo.params = {}; }, {rebuildPanels:true}));
      chips.appendChild(c);
    });
    bgBody.appendChild(chips);
    const def = ATMO_DEFS[f.atmo.effect];
    Object.entries(def.params).forEach(([k, [label,min,max,step,dflt]])=>{
      sliderRow(bgBody, label, min, max, step,
        ()=>f.atmo.params[k] ?? dflt,
        v=>mutate(c=>c.frame.atmo.params[k] = v), {def:dflt});
    });
    if (f.atmo.effect === 'spotlight'){
      const n = el('div','note'); n.textContent = 'Drag the light source directly on the canvas.';
      bgBody.appendChild(n);
    }
    const n2 = el('div','note');
    n2.textContent = REDUCED ? 'Ambient motion disabled (reduced motion).' : 'Drifts slowly; freezes at the current moment on export.';
    bgBody.appendChild(n2);
  }
  else if (type === 'texture'){
    const t = f.texture;
    const chips = el('div','chips');
    TEXTURE_IDS.forEach(([tid, label])=>{
      const c = el('button','chip'+(t.textureId===tid?' on':''));
      const th = el('div','cthumb');
      th.style.backgroundImage = `url(${textureURL(tid)})`;
      th.style.backgroundSize = '160px';
      const lb = el('span'); lb.textContent = label;
      c.append(th, lb);
      c.addEventListener('click', ()=>mutate(cc=>cc.frame.texture.textureId = tid, {rebuildPanels:true}));
      chips.appendChild(c);
    });
    bgBody.appendChild(chips);
    colorRow(bgBody, 'Base', ()=>t.base, v=>mutate(c=>c.frame.texture.base = v));
    selectRow(bgBody, 'Blend',
      ['normal','multiply','screen','overlay','soft-light','hard-light','color-burn','color-dodge','luminosity'].map(b=>[b,b]),
      ()=>t.blendMode, v=>mutate(c=>c.frame.texture.blendMode = v));
    sliderRow(bgBody, 'Opacity', 0, 100, 1, ()=>t.opacity, v=>mutate(c=>c.frame.texture.opacity = v), {def:40});
    const tintRow = mkRow(bgBody, 'Tint');
    const tc = el('input'); tc.type = 'color'; tc.value = t.tint || '#645DD7';
    tc.addEventListener('input', ()=>mutate(c=>c.frame.texture.tint = tc.value));
    const clr = el('button','small'); clr.textContent = t.tint ? 'Clear' : 'Apply';
    clr.addEventListener('click', ()=>mutate(c=>c.frame.texture.tint = c.frame.texture.tint ? null : tc.value, {rebuildPanels:true}));
    tintRow.append(tc, clr);
  }
  else if (type === 'image'){
    const im = f.image;
    const r = mkRow(bgBody);
    const up = el('button','small'); up.textContent = im.src ? 'Replace image' : 'Choose image…'; up.style.flex = '1';
    up.addEventListener('click', ()=>$('bgFilePick').click());
    r.appendChild(up);
    if (im.src){
      const rm = el('button','small'); rm.textContent = '✕'; rm.title = 'Remove';
      rm.addEventListener('click', ()=>mutate(c=>c.frame.image.src = null, {rebuildPanels:true}));
      r.appendChild(rm);
      mkRow(bgBody, 'Fit');
      segRow(bgBody, [['cover','Cover'],['contain','Contain'],['tile','Tile']],
        ()=>im.fit, v=>mutate(c=>c.frame.image.fit = v), true);
      sliderRow(bgBody, 'Scale', 20, 300, 1, ()=>im.scale, v=>mutate(c=>c.frame.image.scale = v), {def:100});
      sliderRow(bgBody, 'X', -50, 50, 1, ()=>im.x, v=>mutate(c=>c.frame.image.x = v), {def:0});
      sliderRow(bgBody, 'Y', -50, 50, 1, ()=>im.y, v=>mutate(c=>c.frame.image.y = v), {def:0});
      sliderRow(bgBody, 'Blur', 0, 60, 1, ()=>im.blur, v=>mutate(c=>c.frame.image.blur = v), {def:0});
      sliderRow(bgBody, 'Brightness', 30, 170, 1, ()=>im.brightness, v=>mutate(c=>c.frame.image.brightness = v), {def:100});
      colorRow(bgBody, 'Tint', ()=>im.tint || '#0B0B0F', v=>mutate(c=>c.frame.image.tint = v));
      sliderRow(bgBody, 'Tint opacity', 0, 100, 1, ()=>im.tintOpacity, v=>mutate(c=>c.frame.image.tintOpacity = v), {def:0});
    }
  }

  /* modifiers */
  const mods = mkSection(body, 'Finish');
  sliderRow(mods, 'Grain', 0, 100, 1, ()=>f.grain, v=>mutate(c=>c.frame.grain = v), {def:10});
  sliderRow(mods, 'Vignette', 0, 100, 1, ()=>f.vignette.amount, v=>mutate(c=>c.frame.vignette.amount = v), {def:0});
  sliderRow(mods, 'Vig. radius', 0, 100, 1, ()=>f.vignette.radius, v=>mutate(c=>c.frame.vignette.radius = v), {def:60});
  checkRow(mods, 'Dither (kills banding)', ()=>f.dither, v=>mutate(c=>c.frame.dither = v));
  sliderRow(mods, 'Padding', 0, 20, 1, ()=>f.padding, v=>mutate(c=>c.frame.padding = v), {def:0});
  sliderRow(mods, 'Corner radius', 0, 200, 1, ()=>f.cornerRadius, v=>mutate(c=>c.frame.cornerRadius = v), {def:0});
  sliderRow(mods, 'Border', 0, 40, 1, ()=>f.border.width, v=>mutate(c=>c.frame.border.width = v), {def:0});
  if (f.border.width > 0)
    colorRow(mods, 'Border colour', ()=>f.border.color, v=>mutate(c=>c.frame.border.color = v));
  checkRow(mods, 'Transparent background', ()=>f.transparent, v=>mutate(c=>c.frame.transparent = v, {rebuildPanels:true}));
  if (f.transparent){
    const n = el('div','note'); n.textContent = 'Export as PNG to keep the alpha channel.';
    mods.appendChild(n);
  }
}

/* ---------------- MOCKUP panel ---------------- */
function buildMockupPanel(body){
  const m = comp.mockups[0];
  const ch = m.device.chrome;
  const dev = DEVICES[m.device.modelId];

  /* device */
  const dsec = mkSection(body, 'Device');
  segRow(dsec, DEVICE_CATEGORIES.map(([id,label])=>[id,label]),
    ()=>m.device.category,
    v=>{
      const first = DEVICE_CATEGORIES.find(([id])=>id===v)[2][0];
      mutate(c=>c.mockups.forEach(mk=>{ mk.device.category = v; mk.device.modelId = first;
        mk.device.variant = Object.keys(DEVICES[first].variants || {default:1})[0]; }), {rebuildPanels:true});
    }, true);
  const models = DEVICE_CATEGORIES.find(([id])=>id===m.device.category)[2];
  if (models.length > 1){
    const chips = el('div','chips', {marginTop:'10px', gridTemplateColumns:`repeat(${Math.min(3,models.length)},1fr)`});
    models.forEach(mid=>{
      const c = el('button','chip'+(m.device.modelId===mid?' on':''));
      const lb = el('span'); lb.textContent = DEVICES[mid].label;
      c.appendChild(lb);
      c.style.padding = '10px 4px';
      c.addEventListener('click', ()=>mutate(cc=>cc.mockups.forEach(mk=>{ mk.device.modelId = mid;
        mk.device.variant = Object.keys(DEVICES[mid].variants || {default:1})[0]; }), {rebuildPanels:true}));
      chips.appendChild(c);
    });
    dsec.appendChild(chips);
  }
  if (dev.variants){
    const vr = el('div', null, {display:'flex', gap:'6px', flexWrap:'wrap', marginTop:'8px'});
    Object.entries(dev.variants).forEach(([vid, v])=>{
      const b = el('button','small'+(m.device.variant===vid?' primary':''));
      b.textContent = v.label;
      b.style.fontSize = '10.5px';
      b.addEventListener('click', ()=>mutate(c=>c.mockups.forEach(mk=>mk.device.variant = vid), {rebuildPanels:true}));
      vr.appendChild(b);
    });
    dsec.appendChild(vr);
  }
  if (m.device.category === 'browser'){
    mkRow(dsec, 'Chrome');
    segRow(dsec, [['light','Light'],['dark','Dark']], ()=>m.device.theme,
      v=>mutate(c=>c.mockups.forEach(mk=>mk.device.theme = v)), true);
    textRow(dsec, 'URL', ()=>ch.url, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.url = v)), 'nimble.studio');
    if (m.device.modelId !== 'browser-minimal')
      textRow(dsec, 'Tab title', ()=>ch.tab, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.tab = v)), 'Page title');
    checkRow(dsec, 'Traffic lights', ()=>ch.traffic !== false, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.traffic = v)));
    if (m.device.modelId === 'browser-arc')
      checkRow(dsec, 'Sidebar layout', ()=>!!ch.sidebar, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.sidebar = v), {rebuildPanels:true}));
  }
  if (m.device.category === 'phone'){
    checkRow(dsec, 'Status bar', ()=>ch.statusBar !== false, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.statusBar = v)));
    if (ch.statusBar !== false)
      textRow(dsec, 'Time', ()=>ch.time, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.time = v)), '9:41');
    checkRow(dsec, 'Dynamic Island', ()=>ch.island !== false, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.island = v)));
  }
  if (m.device.category === 'tablet'){
    mkRow(dsec, 'Orientation');
    segRow(dsec, [['portrait','Portrait'],['landscape','Landscape']], ()=>ch.orientation || 'portrait',
      v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.orientation = v)), true);
  }
  if (m.device.category === 'bare'){
    sliderRow(dsec, 'Radius', 0, 80, 1, ()=>ch.radius ?? 18, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.radius = v)), {def:18});
    checkRow(dsec, 'Inner border', ()=>ch.innerBorder !== false, v=>mutate(c=>c.mockups.forEach(mk=>mk.device.chrome.innerBorder = v)));
  }

  /* screenshot */
  const ssec = mkSection(body, 'Screenshot');
  const hasImg = !!imgOf(m);
  const r = mkRow(ssec);
  const pick = el('button','small'); pick.textContent = hasImg ? 'Replace…' : 'Choose…'; pick.style.flex = '1';
  pick.addEventListener('click', ()=>$('filePick').click());
  r.appendChild(pick);
  if (hasImg){
    const rm = el('button','small'); rm.textContent = '✕'; rm.title = 'Remove screenshot';
    rm.addEventListener('click', ()=>mutate(c=>c.mockups.forEach(mk=>mk.screenshot = null), {rebuildPanels:true}));
    r.appendChild(rm);
    segRow(ssec, [['cover','Cover'],['contain','Contain'],['fill','Fill']],
      ()=>m.screenshot.fit, v=>mutate(c=>c.mockups.forEach(mk=>{ if(mk.screenshot) mk.screenshot.fit = v; })), true);
    sliderRow(ssec, 'Scale', 50, 300, 1, ()=>m.screenshot.scale, v=>mutate(c=>c.mockups.forEach(mk=>{ if(mk.screenshot) mk.screenshot.scale = v; })), {def:100});
    sliderRow(ssec, 'Pan X', -50, 50, 1, ()=>m.screenshot.x, v=>mutate(c=>c.mockups.forEach(mk=>{ if(mk.screenshot) mk.screenshot.x = v; })), {def:0});
    sliderRow(ssec, 'Pan Y', -50, 50, 1, ()=>m.screenshot.y, v=>mutate(c=>c.mockups.forEach(mk=>{ if(mk.screenshot) mk.screenshot.y = v; })), {def:0});
    const rr = mkRow(ssec);
    const reset = el('button','small'); reset.textContent = 'Reset position'; reset.style.flex = '1';
    reset.addEventListener('click', ()=>mutate(c=>c.mockups.forEach(mk=>{ if(mk.screenshot) Object.assign(mk.screenshot, {scale:100,x:0,y:0}); }), {rebuildPanels:true}));
    rr.appendChild(reset);
    const n = el('div','note'); n.textContent = 'Shift-drag on the screen to pan the screenshot.';
    ssec.appendChild(n);
  }

  /* transform */
  const tsec = mkSection(body, 'Transform');
  const T = ()=>comp.mockups[0].transform;
  sliderRow(tsec, 'UI scale', 10, 200, 1, ()=>T().scale, v=>mutate(c=>{ c.mockups[0].transform.scale = v; }, {customLayout:true}), {def:100});
  sliderRow(tsec, 'X', -60, 60, 0.5, ()=>Math.round(T().x*200)/2, v=>mutate(c=>{ c.mockups[0].transform.x = v/100; }, {customLayout:true}), {def:0});
  sliderRow(tsec, 'Y', -60, 60, 0.5, ()=>Math.round(T().y*200)/2, v=>mutate(c=>{ c.mockups[0].transform.y = v/100; }, {customLayout:true}), {def:0});
  sliderRow(tsec, 'Rotate', -45, 45, 1, ()=>T().rotate, v=>mutate(c=>{ c.mockups[0].transform.rotate = Math.abs(v)<2?0:v; }, {customLayout:true}), {def:0});
  sliderRow(tsec, 'Tilt X', -32, 32, 1, ()=>T().rotateX, v=>mutate(c=>{ c.mockups[0].transform.rotateX = v; }, {customLayout:true}), {def:0});
  sliderRow(tsec, 'Tilt Y', -32, 32, 1, ()=>T().rotateY, v=>mutate(c=>{ c.mockups[0].transform.rotateY = v; }, {customLayout:true}), {def:0});
  sliderRow(tsec, 'Depth', 500, 2400, 20, ()=>T().perspective, v=>mutate(c=>{ c.mockups[0].transform.perspective = v; }, {customLayout:true}), {def:1200});
  const trr = mkRow(tsec);
  const rst = el('button','small'); rst.textContent = 'Reset transform'; rst.style.flex = '1';
  rst.addEventListener('click', ()=>mutate(c=>{ Object.assign(c.mockups[0].transform, {scale:100,x:0,y:0,rotate:0,rotateX:0,rotateY:0,perspective:1200}); }, {rebuildPanels:true}));
  trr.appendChild(rst);

  /* shadow */
  const shsec = mkSection(body, 'Shadow');
  const sh = ()=>comp.mockups[0].shadow;
  segRow(shsec, Object.keys(SHADOW_PRESETS).map(k=>[k, k[0].toUpperCase()+k.slice(1)]),
    ()=>sh().presetId || '',
    v=>mutate(c=>c.mockups.forEach(mk=>{ mk.shadow = { presetId:v, ...SHADOW_PRESETS[v], color: mk.shadow.color }; if (v==='none') mk.shadow.color = '#000000'; }), {rebuildPanels:true}), true);
  const manual = (key,label,min,max,def,scale=1) =>
    sliderRow(shsec, label, min, max, 1, ()=>Math.round(sh()[key]*scale),
      v=>mutate(c=>c.mockups.forEach(mk=>{ mk.shadow[key] = v/scale; mk.shadow.presetId = null; })), {def});
  manual('x','X',-120,120,0);
  manual('y','Y',-60,180,26);
  manual('blur','Blur',0,220,60);
  manual('opacity','Opacity',0,100,34,100);
  colorRow(shsec, 'Colour', ()=>sh().color, v=>mutate(c=>c.mockups.forEach(mk=>{ mk.shadow.color = v; mk.shadow.presetId = null; })));
  const sr = mkRow(shsec);
  const sample = el('button','small'); sample.textContent = 'Sample from background'; sample.style.flex = '1';
  sample.title = 'Colour the shadow with the backdrop so it reads as light, not soot';
  sample.addEventListener('click', ()=>{
    const c2 = darken(bgAccent(comp.frame), .55);
    mutate(c=>c.mockups.forEach(mk=>{ mk.shadow.color = c2; mk.shadow.presetId = null; }), {rebuildPanels:true});
  });
  sr.appendChild(sample);

  /* reflection + glow */
  const fx = mkSection(body, 'Reflection & glow');
  checkRow(fx, 'Reflection', ()=>m.reflection.enabled, v=>mutate(c=>c.mockups.forEach(mk=>mk.reflection.enabled = v), {rebuildPanels:true}));
  if (m.reflection.enabled){
    sliderRow(fx, 'Opacity', 0, 80, 1, ()=>m.reflection.opacity, v=>mutate(c=>c.mockups.forEach(mk=>mk.reflection.opacity = v)), {def:30});
    sliderRow(fx, 'Falloff', 5, 95, 1, ()=>m.reflection.falloff, v=>mutate(c=>c.mockups.forEach(mk=>mk.reflection.falloff = v)), {def:40});
  }
  checkRow(fx, 'Rim glow', ()=>m.glow.enabled, v=>mutate(c=>c.mockups.forEach(mk=>mk.glow.enabled = v), {rebuildPanels:true}));
  if (m.glow.enabled)
    sliderRow(fx, 'Strength', 5, 100, 1, ()=>m.glow.strength, v=>mutate(c=>c.mockups.forEach(mk=>mk.glow.strength = v)), {def:40});

  if (comp.mockups.length > 1){
    const n = el('div','note');
    n.textContent = `This layout uses ${comp.mockups.length} copies of the mockup — device and style edits apply to all of them.`;
    body.appendChild(n);
  }
}

function buildPanels(){
  const fb = $('frameBody'), mb = $('mockupBody');
  fb.textContent = ''; mb.textContent = '';
  buildFramePanel(fb);
  buildMockupPanel(mb);
}

/* accordion behaviour — one open at a time, dims the other layer subtly */
document.querySelectorAll('.acc-head').forEach(h=>{
  h.addEventListener('click', ()=>{
    const which = h.dataset.acc;
    if (ui.activeAcc === which) return;
    ui.activeAcc = which;
    $('accFrame').classList.toggle('open', which === 'frame');
    $('accMockup').classList.toggle('open', which === 'mockup');
    document.querySelectorAll('.acc-head').forEach(x=>x.setAttribute('aria-expanded', x.dataset.acc === which));
    renderMain();
  });
});

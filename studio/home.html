<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Nimble</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="assets/theme.css?v=8">
<script src="assets/theme.js"></script>
<style>
  :root, :root[data-theme="dark"]{
    --bg:#0b0b0f; --panel:#131318; --panel2:#1a1a21; --line:#232329; --line2:#31313a;
    --ink:#f4f4f5; --muted:#8f8f98; --faint:#5c5c66;
    --lime:#A3E635;
    --red:#F42C04; --pink:#FF6FAE; --yellow:#FCCA46; --blue:#2DC7FF; --indigo:#645DD7; --lavender:#CBA0FF;
  }
  :root[data-theme="light"]{
    --bg:#ffffff; --panel:#fafafa; --panel2:#f1f1f3; --line:#e9e9e9; --line2:#d9d9d9;
    --ink:#111111; --muted:#71717a; --faint:#a1a1aa;
  }
  @font-face{font-family:'Porkys';src:url('assets/PORKYS_.ttf') format('truetype');font-display:swap;}
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    overflow-y:auto; overflow-x:hidden;
  }
  body::-webkit-scrollbar{width:10px;}
  body::-webkit-scrollbar-thumb{background:var(--line2); border-radius:5px;}

  /* ---------- aurora field behind the hero ---------- */
  .sky{
    position:absolute; inset:0 0 auto 0; height:520px; overflow:hidden; pointer-events:none;
    mask-image:linear-gradient(to bottom, #000 55%, transparent);
    -webkit-mask-image:linear-gradient(to bottom, #000 55%, transparent);
  }
  .sky i{
    position:absolute; width:44vw; height:44vw; min-width:420px; min-height:420px;
    border-radius:50%; filter:blur(90px); opacity:.32;
  }
  :root[data-theme="light"] .sky i{opacity:.2;}
  .sky i:nth-child(1){background:var(--indigo);  left:-8vw;  top:-16vw; animation:drift1 26s ease-in-out infinite alternate;}
  .sky i:nth-child(2){background:var(--pink);    left:34vw;  top:-22vw; animation:drift2 31s ease-in-out infinite alternate;}
  .sky i:nth-child(3){background:var(--blue);    right:-12vw;top:-10vw; animation:drift3 24s ease-in-out infinite alternate;}
  .sky i:nth-child(4){background:var(--lime);    left:52vw;  top:2vw;  width:20vw; height:20vw; min-width:220px; min-height:220px; opacity:.16; animation:drift1 36s ease-in-out infinite alternate-reverse;}
  @keyframes drift1{to{transform:translate(6vw,4vw) scale(1.12);}}
  @keyframes drift2{to{transform:translate(-5vw,5vw) scale(.94);}}
  @keyframes drift3{to{transform:translate(-4vw,6vw) scale(1.08);}}
  @media (prefers-reduced-motion:reduce){ .sky i{animation:none !important;} }

  .wrap{position:relative; max-width:1060px; margin:0 auto; padding:0 32px 80px;}

  /* ---------- hero ---------- */
  .hero{padding:88px 0 60px; text-align:center; position:relative;}
  .hero .kicker{
    display:inline-flex; align-items:center; gap:8px;
    font-size:10.5px; font-weight:700; letter-spacing:.26em; text-transform:uppercase; color:var(--muted);
    border:1px solid var(--line); border-radius:999px; padding:7px 14px; margin-bottom:26px;
    background:color-mix(in srgb, var(--bg) 72%, transparent); backdrop-filter:blur(6px);
  }
  .hero .kicker .live{
    width:7px; height:7px; border-radius:50%; background:var(--lime);
    box-shadow:0 0 8px rgba(163,230,53,.9);
  }
  .hero h1{
    font-family:'Porkys','Arial Rounded MT Bold',sans-serif; font-weight:400;
    font-size:clamp(56px, 9vw, 104px); line-height:.98; letter-spacing:.04em; text-transform:uppercase;
  }
  .hero h1 .s{display:inline-block; transform:rotate(var(--r,0deg)) translateY(var(--y,0));}
  .hero h1 .s:nth-child(1){--r:-4deg; color:var(--red);}
  .hero h1 .s:nth-child(2){--r:3deg;  color:var(--pink);}
  .hero h1 .s:nth-child(3){--r:-2deg; color:var(--yellow);}
  .hero h1 .s:nth-child(4){--r:4deg;  color:var(--blue);}
  .hero h1 .s:nth-child(5){--r:-3deg; color:var(--indigo);}
  .hero h1 .s:nth-child(6){--r:5deg;  color:var(--lavender);}
  .hero p{
    margin:22px auto 0; max-width:480px; color:var(--muted); font-size:15px; line-height:1.65; font-weight:500;
  }
  .hero p b{color:var(--ink); font-weight:700;}

  /* ---------- tool cards ---------- */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:18px; margin-top:26px;
  }
  .card{
    position:relative; display:flex; flex-direction:column; text-align:left;
    background:var(--panel); border:1px solid var(--line); border-radius:18px; overflow:hidden;
    cursor:pointer; padding:0; font-family:inherit; color:var(--ink);
    transition:transform .22s cubic-bezier(.3,1.2,.5,1), border-color .18s, box-shadow .18s;
  }
  .card:hover, .card:focus-visible{
    transform:translateY(-4px);
    border-color:color-mix(in srgb, var(--lime) 55%, var(--line));
    box-shadow:0 18px 44px -18px rgba(0,0,0,.5), 0 0 0 1px color-mix(in srgb, var(--lime) 45%, transparent), 0 0 26px -6px rgba(163,230,53,.35);
    outline:none;
  }
  .card .art{position:relative; aspect-ratio:16/9; overflow:hidden; background:#101014;}
  .card .body{display:flex; align-items:center; gap:12px; padding:15px 16px;}
  .card .body .txt{min-width:0; flex:1;}
  .card .body h3{font-size:15px; font-weight:800; letter-spacing:-.02em;}
  .card .body p{font-size:11.5px; color:var(--muted); margin-top:2px; font-weight:500;}
  .card .go{
    flex:none; width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line2); color:var(--muted); font-size:14px;
    transition:background .18s, color .18s, border-color .18s, transform .22s;
  }
  .card:hover .go{background:var(--lime); border-color:var(--lime); color:#111; transform:rotate(-45deg);}

  /* per-tool art, all CSS */
  .art-mash{background:#0e0d16;}
  .art-mash i{position:absolute; border-radius:50%; filter:blur(26px); opacity:.9;}
  .art-mash i:nth-child(1){width:55%; height:95%; background:var(--indigo); left:-8%; top:-20%;}
  .art-mash i:nth-child(2){width:50%; height:90%; background:var(--pink); right:-6%; top:-30%;}
  .art-mash i:nth-child(3){width:60%; height:80%; background:var(--blue); left:24%; bottom:-40%;}
  .art-mash i:nth-child(4){width:30%; height:52%; background:var(--yellow); right:18%; bottom:-18%; opacity:.75;}
  .card:hover .art-mash i{transition:transform 1.2s ease; transform:scale(1.15) rotate(6deg);}

  .art-stage{background:linear-gradient(135deg, var(--pink), var(--indigo));}
  .art-stage .win{
    position:absolute; left:14%; right:14%; top:20%; bottom:-6%;
    background:#101014; border-radius:10px 10px 0 0;
    box-shadow:0 18px 40px -12px rgba(0,0,0,.55);
    transition:transform .3s cubic-bezier(.3,1.2,.5,1);
  }
  .card:hover .art-stage .win{transform:translateY(-5px) rotate(-1deg);}
  .art-stage .win .bar{height:14%; display:flex; align-items:center; gap:4px; padding:0 8px;
    background:#1d1d24; border-radius:10px 10px 0 0;}
  .art-stage .win .bar b{width:5px; height:5px; border-radius:50%;}
  .art-stage .win .bar b:nth-child(1){background:#FF5F57;}
  .art-stage .win .bar b:nth-child(2){background:#FEBC2E;}
  .art-stage .win .bar b:nth-child(3){background:#28C840;}
  .art-stage .win .blk{display:block; margin:8% 10% 0; height:16%; border-radius:5px;}
  .art-stage .win .bar{display:flex;}

  .art-digit{background:#0d1310;}
  .art-digit b{
    position:absolute; border:2px solid var(--lime); border-radius:50%; opacity:.85;
    left:50%; top:52%; transform:translate(-50%,-50%);
  }
  .art-digit b:nth-child(1){width:26px; height:26px; background:rgba(163,230,53,.28); border-width:0;}
  .art-digit b:nth-child(2){width:74px; height:74px; opacity:.55;}
  .art-digit b:nth-child(3){width:130px; height:130px; opacity:.28;}
  .art-digit b:nth-child(4){width:190px; height:190px; opacity:.12;}
  .card:hover .art-digit b{transition:transform .5s ease; transform:translate(-50%,-50%) scale(1.12);}
  .art-digit s{
    position:absolute; width:34px; height:2.5px; background:var(--blue); border-radius:2px; opacity:.8;
  }
  .art-digit s:nth-child(5){left:16%; top:30%; transform:rotate(-24deg);}
  .art-digit s:nth-child(6){right:15%; top:66%; transform:rotate(18deg); background:var(--pink);}

  .art-motion{background:#120d0d; display:flex; align-items:center; justify-content:center; overflow:hidden;}
  .art-motion span{
    font-family:'Porkys','Arial Rounded MT Bold',sans-serif; font-size:54px; letter-spacing:.04em;
    color:var(--yellow); text-transform:uppercase; position:relative; transform:skewX(-6deg);
  }
  .art-motion span::before, .art-motion span::after{
    content:'M'; position:absolute; left:0; top:0;
  }
  .art-motion span::before{color:var(--red); transform:translateX(-10px); opacity:.5;}
  .art-motion span::after{color:var(--blue); transform:translateX(-20px); opacity:.25;}
  .card:hover .art-motion span{transition:transform .3s; transform:skewX(-12deg) translateX(6px);}

  .art-stipple{
    background:#0f0f13;
    background-image:radial-gradient(circle at 3px 3px, #e8e8ee 2.2px, transparent 0);
    background-size:12px 12px;
    mask-image:radial-gradient(ellipse 110% 110% at 45% 42%, #000 35%, transparent 85%);
    -webkit-mask-image:radial-gradient(ellipse 110% 110% at 45% 42%, #000 35%, transparent 85%);
  }
  .art-stipple-wrap{background:#0f0f13;}
  .card:hover .art-stipple{transition:background-size .35s; background-size:13px 13px;}

  .art-soon{background:var(--panel2); display:flex; align-items:center; justify-content:center;}
  .art-soon span{color:var(--faint); font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;}
  .card.soon{cursor:default;}
  .card.soon:hover{transform:none; border-color:var(--line); box-shadow:none;}
  .card.soon:hover .go{background:transparent; border-color:var(--line2); color:var(--muted); transform:none;}

  /* ---------- section labels + footer ---------- */
  .seclabel{
    margin-top:52px; font-size:10px; font-weight:700; letter-spacing:.24em; text-transform:uppercase; color:var(--faint);
    display:flex; align-items:center; gap:14px;
  }
  .seclabel::after{content:''; flex:1; height:1px; background:var(--line);}
  .foot{
    margin-top:64px; padding-top:26px; border-top:1px solid var(--line);
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    color:var(--faint); font-size:11.5px; font-weight:500;
  }
  .foot .lock{display:flex; align-items:center; gap:8px;}
  .foot .lock svg{width:13px; height:13px;}
  .foot .grow{flex:1;}
  .foot a{color:var(--muted); text-decoration:none; font-weight:600;}
  .foot a:hover{color:var(--ink);}
</style>
</head>
<body>

<div class="sky" aria-hidden="true"><i></i><i></i><i></i><i></i></div>

<div class="wrap">
  <header class="hero">
    <div class="kicker"><span class="live"></span> Five tools · zero uploads · all browser</div>
    <h1 aria-label="Studio">
      <span class="s">S</span><span class="s">T</span><span class="s">U</span><span class="s">D</span><span class="s">I</span><span class="s">O</span>
    </h1>
    <p>Nimble's workbench of <b>small, playful, seriously capable</b> creative tools. Pick one on the left — or dive in below.</p>
  </header>

  <div class="seclabel">The tools</div>
  <div class="grid" id="grid">

    <button class="card" data-tool="mash">
      <span class="art art-mash"><i></i><i></i><i></i><i></i></span>
      <span class="body">
        <span class="txt"><h3>Mash</h3><p>Organic mesh gradients, rendered on the GPU, exported at any size.</p></span>
        <span class="go">→</span>
      </span>
    </button>

    <button class="card" data-tool="stage">
      <span class="art art-stage">
        <span class="win"><span class="bar"><b></b><b></b><b></b></span>
          <span class="blk" style="background:var(--yellow)"></span>
          <span class="blk" style="background:var(--red)"></span>
          <span class="blk" style="background:var(--blue)"></span>
        </span>
      </span>
      <span class="body">
        <span class="txt"><h3>Stage</h3><p>Frame a screenshot in a device mockup and make it postable in 30 seconds.</p></span>
        <span class="go">→</span>
      </span>
    </button>

    <button class="card" data-tool="digit">
      <span class="art art-digit"><b></b><b></b><b></b><b></b><s></s><s></s></span>
      <span class="body">
        <span class="txt"><h3>Digit</h3><p>Camera effects you control by pinching — hands are the interface.</p></span>
        <span class="go">→</span>
      </span>
    </button>

    <button class="card" data-tool="motion">
      <span class="art art-motion"><span>M</span></span>
      <span class="body">
        <span class="txt"><h3>Motion</h3><p>Kinetic type and looping title scenes, recorded straight to video.</p></span>
        <span class="go">→</span>
      </span>
    </button>

    <button class="card" data-tool="stipple">
      <span class="art art-stipple-wrap"><span class="art art-stipple" style="position:absolute;inset:0"></span></span>
      <span class="body">
        <span class="txt"><h3>Stipple</h3><p>Dither, halftone and retro print treatments for any image.</p></span>
        <span class="go">→</span>
      </span>
    </button>

    <button class="card soon" tabindex="-1" aria-disabled="true">
      <span class="art art-soon"><span>More soon</span></span>
      <span class="body">
        <span class="txt"><h3>Unnamed</h3><p>The next tool lands right here.</p></span>
        <span class="go">·</span>
      </span>
    </button>

  </div>

  <footer class="foot">
    <span class="lock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      Everything runs on your device — no uploads, no accounts, no telemetry.
    </span>
    <span class="grow"></span>
    <a href="../index.html" target="_top">nimble ↗</a>
  </footer>
</div>

<script>
  // open a tool: inside the Studio shell, drive the parent; standalone, go via the shell
  document.querySelectorAll('.card[data-tool]').forEach(c => {
    c.addEventListener('click', () => {
      const id = c.dataset.tool;
      try{
        if (window.parent !== window){ window.parent.location.hash = id; return; }
      }catch(e){}
      location.href = 'index.html#' + id;
    });
  });
</script>

</body>
</html>
